  const genScript = async () => {
    setScriptLoading(true); setScript("");
    const top = OPIC_TOPICS.find(t=>t.id===scriptTopic);
    const lenGuide = scriptLen==="short" ? "3~4문장" : scriptLen==="medium" ? "5~7문장" : "8~10문장";
    const prompt = `OPIc 시험을 준비하는 한국인을 위해 "${top.label}" 주제의 영어 스크립트를 작성해주세요.

${scriptMyStory ? `[내가 말하고 싶은 내용/경험]\n${scriptMyStory}\n\n위 내용을 바탕으로 자연스럽게 영어로 표현해주세요.` : ""}
${scriptKw ? `[포함할 키워드] ${scriptKw}` : ""}

조건:
- 목표 레벨: ${scriptLevel} 수준의 자연스러운 구어체
- 길이: ${lenGuide}
- 1인칭 구어체, 실제 시험 답변처럼 자연스럽게
- 어색한 표현 없이 원어민이 실제로 쓸 법한 표현 사용
- 스크립트만 출력 (설명, 번역, 주석 없이)`;
    const txt = await callClaude(prompt, 500);
    setScript(txt.trim()); setScriptLoading(false);
  };

  const startRoleplay = async () => {
    setRpStarted(true); setRpLoading(true); setRpHistory([]);
    const top = OPIC_TOPICS.find(t=>t.id===rpTopic);
    const opener = await callClaude(`You are an OPIc examiner. Start a role-play about "${top.label}" in English. Ask one natural opening question only. Be friendly. Question only, no explanation.`,80);
    setRpHistory([{role:"examiner",text:opener.trim()}]);
    setRpLoading(false);
  };
  const sendRp = async () => {
    if(!rpInput.trim()) return;
    const userMsg=rpInput.trim(); setRpInput("");
    const h=[...rpHistory,{role:"user",text:userMsg}];
    setRpHistory(h); setRpLoading(true);
    const top=OPIC_TOPICS.find(t=>t.id===rpTopic);
    const reply=await callClaude(`You are a friendly OPIc examiner for topic "${top.label}". Continue naturally. 2-3 sentences max.\n\n${h.map(x=>`${x.role==="examiner"?"Examiner":"Me"}: ${x.text}`).join("\n")}\nExaminer:`,120);
    setRpHistory([...h,{role:"examiner",text:reply.trim()}]);
    setRpLoading(false);
  };
  const addNote = () => {
    if(!noteText.trim()) return;
    const top=OPIC_TOPICS.find(t=>t.id===noteTopic);
    saveNotes([{id:Date.now(),text:noteText.trim(),topic:top.label,emoji:top.emoji,date:new Date().toLocaleDateString("ko-KR")},...notes]);
    setNoteText("");
  };

  // Review data
  const reviewItems = DAILY_DATA.flatMap(d=>d.expressions.map((expr,i)=>({day:d.day,theme:d.theme,idx:i,expr})).filter((_,i)=>checked[`${d.day}-${i}`]));

  return (
    <div style={OP.root}>
      {/* Header */}
      <div style={OP.header}>
        <button style={OP.homeBtn} onClick={onBack} title="홈">🏠</button>
        <div style={{flex:1}}>
          <div style={OP.title}>🌱 Level Up</div>
          <div style={OP.subtitle}>OPIc Speaking Coach</div>
        </div>
        {tab==="daily"&&<button style={OP.reviewOpenBtn} onClick={()=>setShowReview(true)}>📋 복습</button>}
      </div>

      {/* Tabs */}
      <div style={OP.tabs}>
        {[["daily","📚 일일학습"],["script","📝 스크립트"],["roleplay","🎭 롤플레이"],["notes","💾 노트"]].map(([v,l])=>(
          <button key={v} style={tab===v?OP.tabA:OP.tabI} onClick={()=>setTab(v)}>{l}</button>
        ))}
      </div>

      <div style={OP.body}>

        {/* ── 일일 학습 ── */}
        {tab==="daily"&&(
          <>
            {/* Day selector */}
            <div style={{display:"flex",gap:6,marginBottom:12,overflowX:"auto",paddingBottom:4}}>
              {DAILY_DATA.map(d=>{
                const dc=d.expressions.filter((_,i)=>checked[`${d.day}-${i}`]).length;
                const done=dc===d.expressions.length;
                const active=d.day===curDay;
                return(
                  <button key={d.day} style={{...OP.dayBtn,...(active?OP.dayBtnActive:done?OP.dayBtnDone:{})}} onClick={()=>setCurDay(d.day)}>
                    {d.day}
                  </button>
                );
              })}
            </div>

            {/* Progress */}
            <div style={{marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <div style={{fontSize:13,fontWeight:700,color:"#c7d2fe"}}>Day {curDay} — {dayData.theme}</div>
                <div style={{fontSize:12,color:"#818cf8",fontWeight:600}}>{dayChecked}/{dayData.expressions.length}</div>
              </div>
              <div style={OP.progressTrack}>
                <div style={{...OP.progressFill,width:`${pct}%`}}/>
              </div>
              <div style={{fontSize:11,color:"#64748b",textAlign:"right",marginTop:4}}>{pct}% 학습 완료</div>
            </div>

            {/* Cards */}
            {dayData.expressions.map((expr,i)=>(
              <ExpressionCard
                key={`${curDay}-${i}`}
                expr={expr} idx={i} dayNum={curDay}
                checked={!!checked[`${curDay}-${i}`]}
                onToggleCheck={()=>toggleCheck(curDay,i)}
              />
            ))}

            {/* Day nav */}
            <div style={OP.dayNav}>
              <button style={OP.dayNavBtn} disabled={curDay===1} onClick={()=>setCurDay(d=>d-1)}>← 이전</button>
              <span style={{color:"#64748b",fontSize:13}}>Day {curDay} / {DAILY_DATA.length}</span>
              <button style={OP.dayNavBtn} disabled={curDay===DAILY_DATA.length} onClick={()=>setCurDay(d=>d+1)}>다음 →</button>
            </div>
          </>
        )}

        {/* ── 스크립트 ── */}
        {tab==="script"&&(
          <>
            <div style={OP.secTitle}>나만의 스크립트 생성</div>

            {/* 주제 */}
            <div style={OP.scriptLabel}>📌 주제 선택</div>
            <div style={OP.topicGrid}>
              {OPIC_TOPICS.map(t=>(
                <button key={t.id} style={scriptTopic===t.id?OP.topicA:OP.topicI} onClick={()=>setScriptTopic(t.id)}>
                  {t.emoji} {t.label}
                </button>
              ))}
            </div>

            {/* 내가 말하고 싶은 내용 */}
            <div style={OP.scriptLabel}>✏️ 내가 말하고 싶은 내용 <span style={{color:"rgba(255,255,255,0.3)",fontWeight:400}}>(한국어/영어 모두 OK)</span></div>
            <textarea
              style={{...OP.noteTA, minHeight:90, marginBottom:10}}
              placeholder={"예) 나는 주말마다 한강에서 자전거를 타는 걸 좋아한다.\n퇴근 후엔 주로 유튜브를 보거나 요리를 한다.\n최근에 새로 이사한 동네가 마음에 든다."}
              value={scriptMyStory}
              onChange={e=>setScriptMyStory(e.target.value)}
            />

            {/* 키워드 */}
            <div style={OP.scriptLabel}>🔑 추가 키워드 <span style={{color:"rgba(255,255,255,0.3)",fontWeight:400}}>(선택)</span></div>
            <input style={{...OP.inp}} placeholder="예: 강아지, 재택근무, 해외여행..." value={scriptKw} onChange={e=>setScriptKw(e.target.value)}/>

            {/* 레벨 & 길이 */}
            <div style={{display:"flex",gap:10,marginBottom:14}}>
              <div style={{flex:1}}>
                <div style={OP.scriptLabel}>🎯 목표 레벨</div>
                <div style={{display:"flex",gap:6}}>
                  {["IM1","IM2","IH","AL"].map(l=>(
                    <button key={l} style={{flex:1,padding:"7px 4px",fontSize:12,fontWeight:700,borderRadius:9,cursor:"pointer",
                      background: scriptLevel===l?"rgba(129,140,248,0.25)":"rgba(255,255,255,0.04)",
                      border: scriptLevel===l?"1px solid rgba(129,140,248,0.5)":"1px solid rgba(255,255,255,0.08)",
                      color: scriptLevel===l?"#c7d2fe":"rgba(255,255,255,0.35)"
                    }} onClick={()=>setScriptLevel(l)}>{l}</button>
                  ))}
                </div>
              </div>
              <div style={{flex:1}}>
                <div style={OP.scriptLabel}>📏 길이</div>
                <div style={{display:"flex",gap:6}}>
                  {[["short","짧게"],["medium","보통"],["long","길게"]].map(([v,l])=>(
                    <button key={v} style={{flex:1,padding:"7px 4px",fontSize:11,fontWeight:700,borderRadius:9,cursor:"pointer",
                      background: scriptLen===v?"rgba(96,165,250,0.2)":"rgba(255,255,255,0.04)",
                      border: scriptLen===v?"1px solid rgba(96,165,250,0.4)":"1px solid rgba(255,255,255,0.08)",
                      color: scriptLen===v?"#93c5fd":"rgba(255,255,255,0.35)"
                    }} onClick={()=>setScriptLen(v)}>{l}</button>
                  ))}
                </div>
              </div>
            </div>

            <button style={OP.genBtn} onClick={genScript} disabled={scriptLoading}>
              {scriptLoading ? "생성 중..." : "✦ 스크립트 생성"}
            </button>

            {script&&(
              <div style={OP.scriptBox}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <div style={{fontSize:11,color:"#818cf8",fontWeight:700,letterSpacing:1,textTransform:"uppercase"}}>
                    ✦ 생성된 스크립트
                  </div>
                  {/* 🔊 듣기 버튼 */}
                  <button
                    style={{
                      width:34, height:34, borderRadius:"50%",
                      border: scriptPlaying ? "1px solid rgba(251,191,36,0.7)" : "1px solid rgba(255,255,255,0.15)",
                      background: scriptPlaying ? "rgba(251,191,36,0.2)" : "rgba(255,255,255,0.07)",
                      color: scriptPlaying ? "#fbbf24" : "#94a3b8",
                      fontSize:16, cursor:"pointer",
                      display:"flex", alignItems:"center", justifyContent:"center"
                    }}
                    onClick={() => {
                      if (!("speechSynthesis" in window)) return;
                      const synth = window.speechSynthesis;
                      if (synth.speaking) { synth.cancel(); setScriptPlaying(false); return; }
                      const utter = new SpeechSynthesisUtterance(script);
                      utter.lang = "en-US"; utter.rate = 0.82;
                      const vs = synth.getVoices();
                      const v = vs.find(v=>v.lang==="en-US"&&v.name.includes("Samantha"))
                             || vs.find(v=>v.lang==="en-US")
                             || vs.find(v=>v.lang.startsWith("en"));
                      if (v) utter.voice = v;
                      utter.onstart = () => setScriptPlaying(true);
                      utter.onend   = () => setScriptPlaying(false);
                      utter.onerror = () => setScriptPlaying(false);
                      synth.speak(utter);
                      setTimeout(() => { if (synth.paused) synth.resume(); }, 150);
                    }}
                    title={scriptPlaying ? "중지" : "원어민 발음 듣기"}
                  >
                    {scriptPlaying ? "⏹" : "🔊"}
                  </button>
                </div>
                <div style={OP.scriptText}>{script}</div>
                <div style={{display:"flex",gap:8,marginTop:12}}>
                  <button style={{...OP.saveNoteBtn,flex:1}} onClick={()=>saveNotes([{id:Date.now(),text:script,topic:OPIC_TOPICS.find(t=>t.id===scriptTopic).label,emoji:OPIC_TOPICS.find(t=>t.id===scriptTopic).emoji,date:new Date().toLocaleDateString("ko-KR")},...notes])}>
                    💾 노트에 저장
                  </button>
                  <button style={{...OP.saveNoteBtn,flex:1,borderColor:"rgba(129,140,248,0.3)",color:"#818cf8",background:"rgba(129,140,248,0.08)"}} onClick={genScript}>
                    🔄 다시 생성
                  </button>
                </div>
              </div>
            )}
          </>
        )}

        {/* ── 롤플레이 ── */}
        {tab==="roleplay"&&(
          <>
            <div style={OP.secTitle}>AI 시험관과 롤플레이</div>
            {!rpStarted?(
              <>
                <div style={OP.topicGrid}>
                  {OPIC_TOPICS.map(t=><button key={t.id} style={rpTopic===t.id?OP.topicA:OP.topicI} onClick={()=>setRpTopic(t.id)}>{t.emoji} {t.label}</button>)}
                </div>
                <button style={OP.genBtn} onClick={startRoleplay}>🎙 롤플레이 시작</button>
                <div style={OP.tipBox}>💡 AI 시험관이 주제에 맞는 질문을 던집니다. 영어로 자유롭게 답해보세요!</div>
              </>
            ):(
              <>
                <div style={OP.chatBox}>
                  {rpHistory.map((h,i)=>(
                    <div key={i} style={h.role==="examiner"?OP.chatExaminer:OP.chatUser}>
                      {h.role==="examiner"&&<div style={OP.chatRole}>🎙 Examiner</div>}
                      <div style={OP.chatText}>{h.text}</div>
                    </div>
                  ))}
                  {rpLoading&&<div style={{...OP.chatExaminer,opacity:0.5}}><div style={OP.chatRole}>🎙 Examiner</div><div style={OP.chatText}>...</div></div>}
                </div>
                <div style={{display:"flex",gap:8,marginTop:10}}>
                  <input style={{...OP.inp,flex:1,marginBottom:0}} placeholder="영어로 답변하세요..." value={rpInput} onChange={e=>setRpInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendRp()}/>
                  <button style={OP.sendBtn} onClick={sendRp}>›</button>
                </div>
                <button style={{...OP.genBtn,marginTop:8,background:"rgba(255,255,255,0.05)",color:"rgba(255,255,255,0.4)",boxShadow:"none"}} onClick={()=>{setRpStarted(false);setRpHistory([]);}}>새로 시작</button>
              </>
            )}
          </>
        )}

        {/* ── 노트 ── */}
        {tab==="notes"&&(
          <>
            <div style={OP.secTitle}>나만의 답변 노트</div>
            <div style={{display:"flex",gap:8,marginBottom:8}}>
              <select style={{...OP.inp,flex:"none",width:110}} value={noteTopic} onChange={e=>setNoteTopic(e.target.value)}>
                {OPIC_TOPICS.map(t=><option key={t.id} value={t.id}>{t.emoji} {t.label}</option>)}
              </select>
              <button style={OP.addNoteBtn} onClick={addNote}>+ 저장</button>
            </div>
            <textarea style={OP.noteTA} placeholder="기억하고 싶은 표현이나 스크립트를 저장하세요..." value={noteText} onChange={e=>setNoteText(e.target.value)}/>
            {notes.length===0&&<div style={{color:"rgba(255,255,255,0.2)",textAlign:"center",padding:"30px 0",fontSize:13}}>저장된 노트가 없어요 📝</div>}
            {notes.map(n=>(
              <div key={n.id} style={OP.noteCard}>
                <div style={OP.noteHeader}>
                  <span>{n.emoji} {n.topic}</span>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{color:"rgba(255,255,255,0.25)",fontSize:11}}>{n.date}</span>
                    <button style={OP.delBtn} onClick={()=>saveNotes(notes.filter(x=>x.id!==n.id))}>×</button>
                  </div>
                </div>
                <div style={OP.noteText}>{n.text}</div>
              </div>
            ))}
          </>
        )}
      </div>

      {/* 복습 모달 */}
      {showReview&&(
        <div style={{position:"absolute",inset:0,background:"#0f172a",display:"flex",flexDirection:"column",zIndex:50}}>
          <div style={{...OP.header,justifyContent:"space-between"}}>
            <div>
              <div style={{fontSize:10,letterSpacing:3,color:"#818cf8",fontWeight:700,textTransform:"uppercase"}}>OPIc 복습</div>
              <div style={{fontSize:16,fontWeight:700,color:"#f8fafc"}}>완료한 표현 모아보기</div>
              <div style={{fontSize:12,color:"#64748b"}}>{totalChecked}개 완료 · {DAILY_DATA.filter(d=>d.expressions.every((_,i)=>checked[`${d.day}-${i}`])).length}/{DAILY_DATA.length}일 완성</div>
            </div>
            <button style={{width:36,height:36,borderRadius:"50%",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.12)",color:"#94a3b8",fontSize:18,cursor:"pointer"}} onClick={()=>setShowReview(false)}>✕</button>
          </div>

          {/* Review tabs */}
          <div style={{display:"flex",overflowX:"auto",borderBottom:"1px solid rgba(255,255,255,0.06)",flexShrink:0}}>
            {[["all",`전체 (${totalChecked})`],...DAILY_DATA.map(d=>{const c=d.expressions.filter((_,i)=>checked[`${d.day}-${i}`]).length;return c>0?[`day-${d.day}`,`Day ${d.day} (${c})`]:null}).filter(Boolean)].map(([v,l])=>(
              <button key={v} style={{...OP.tabI,...(reviewTab===v?{color:"#a5b4fc",borderBottom:"2px solid #818cf8"}:{})}} onClick={()=>setReviewTab(v)}>{l}</button>
            ))}
          </div>

          <div style={{flex:1,overflowY:"auto",padding:"16px 16px 40px"}}>
            {reviewItems.length===0&&(
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"60px 20px",color:"#475569",textAlign:"center",gap:12}}>
                <div style={{fontSize:48}}>📚</div>
                <div style={{fontSize:16,fontWeight:600}}>아직 완료한 표현이 없어요</div>
                <div style={{fontSize:13}}>카드 하단의 "학습했어요" 버튼을 눌러<br/>완료하면 여기서 복습할 수 있어요!</div>
              </div>
            )}
            {reviewItems.length>0&&reviewTab==="all"&&(
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:20}}>
                {[[totalChecked,"완료 표현"],[DAILY_DATA.filter(d=>d.expressions.every((_,i)=>checked[`${d.day}-${i}`])).length,"완성 일수"],[Math.round(totalChecked/totalExpr*100)+"%","전체 진도"]].map(([n,l])=>(
                  <div key={l} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:12,padding:"14px 10px",textAlign:"center"}}>
                    <div style={{fontSize:24,fontWeight:800,color:"#a5b4fc"}}>{n}</div>
                    <div style={{fontSize:10,color:"#64748b",marginTop:3}}>{l}</div>
                  </div>
                ))}
              </div>
            )}
            {DAILY_DATA.map(d=>{
              const items=d.expressions.map((expr,i)=>({expr,i})).filter(({i})=>checked[`${d.day}-${i}`]);
              if(!items.length) return null;
              if(reviewTab!=="all"&&reviewTab!==`day-${d.day}`) return null;
              return(
                <div key={d.day} style={{marginBottom:24}}>
                  <div style={{fontSize:11,fontWeight:700,letterSpacing:2,color:"#818cf8",textTransform:"uppercase",marginBottom:10,paddingBottom:8,borderBottom:"1px solid rgba(129,140,248,0.2)",display:"flex",justifyContent:"space-between"}}>
                    <span>Day {d.day} — {d.theme}</span>
                    <span style={{background:"rgba(129,140,248,0.15)",borderRadius:99,padding:"2px 10px",fontSize:11,color:"#a5b4fc",letterSpacing:0}}>{items.length}개</span>
                  </div>
                  {items.map(({expr,i})=>(
                    <ReviewItem key={i} expr={expr} dayNum={d.day} idx={i}/>
                  ))}
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

function ReviewItem({ expr, dayNum, idx }) {
  const [showTr, setShowTr] = useState(false);
  const [playing, setPlaying] = useState(false);
  const speak = () => {
    if(!("speechSynthesis" in window)) return;
    const synth=window.speechSynthesis;
    if(synth.speaking){synth.cancel();setPlaying(false);return;}
    const u=new SpeechSynthesisUtterance(expr.example);
    u.lang="en-US";u.rate=0.85;
    const v=synth.getVoices();
    const voice=v.find(v=>v.lang==="en-US")||v.find(v=>v.lang.startsWith("en"));
    if(voice)u.voice=voice;
    u.onstart=()=>setPlaying(true);u.onend=()=>setPlaying(false);u.onerror=()=>setPlaying(false);
    synth.speak(u);
  };
  return(
    <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:12,padding:"14px 16px",marginBottom:8}}>
      <div style={{fontSize:15,fontWeight:700,color:"#c7d2fe",marginBottom:3}}>{expr.phrase}</div>
      <div style={{fontSize:12,color:"#64748b",marginBottom:8}}>{expr.meaning}</div>
      <div style={{fontSize:13,color:"#94a3b8",fontStyle:"italic",lineHeight:"1.6"}}>"{expr.example}"</div>
      {showTr&&<div style={{fontSize:12,color:"#6ee7b7",marginTop:4,lineHeight:"1.5"}}>{expr.translation}</div>}
      <div style={{display:"flex",gap:6,marginTop:10}}>
        <button style={{width:28,height:28,borderRadius:"50%",border:"1px solid rgba(255,255,255,0.12)",background:playing?"rgba(251,191,36,0.15)":"rgba(255,255,255,0.06)",color:playing?"#fbbf24":"#64748b",fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}} onClick={speak}>{playing?"⏹":"🔊"}</button>
        <button style={{fontSize:11,fontWeight:600,padding:"0 10px",height:28,borderRadius:7,border:showTr?"1px solid rgba(52,211,153,0.4)":"1px solid rgba(255,255,255,0.1)",background:showTr?"rgba(52,211,153,0.08)":"rgba(255,255,255,0.05)",color:showTr?"#6ee7b7":"#64748b",cursor:"pointer"}} onClick={()=>setShowTr(v=>!v)}>
          {showTr?"해석 숨기기":"🇰🇷 해석 보기"}
        </button>
      </div>
    </div>
  );
}

   Weather App — 아침 날씨 & 옷차림 브리핑

const WEATHER_KEY = "weather-city";

async function fetchWeatherBriefing(city) {
  const prompt = `당신은 친근한 아침 날씨 & 패션 어시스턴트입니다.
오늘 "${city}"의 날씨와 옷차림 정보를 알려주세요.

반드시 아래 JSON 형식으로만 응답하세요 (다른 텍스트 없이):
{
  "city": "도시명",
  "date": "오늘 날짜 (예: 6월 15일 월요일)",
  "temp": "기온 범위 (예: 18~25°C)",
  "feels": "체감온도 (예: 약 22°C)",
  "condition": "날씨 상태 (예: 맑음, 흐림, 비, 구름 조금)",
  "conditionEmoji": "날씨 이모지 하나",
  "humidity": "습도 (예: 60%)",
  "wind": "바람 (예: 약 3m/s 남서풍)",
  "uvIndex": "자외선 지수 (예: 보통)",
  "sunrise": "일출 시간 (예: 06:12)",
  "sunset": "일몰 시간 (예: 19:48)",
  "sunrise": "일출 시간 (예: 06:12)",
  "sunset": "일몰 시간 (예: 19:43)",
  "morning": "오전 날씨 한 줄",
  "afternoon": "오후 날씨 한 줄",
  "evening": "저녁 날씨 한 줄",
  "outfit": {
    "top": "상의 추천 (예: 얇은 긴팔 셔츠 또는 반팔)",
    "bottom": "하의 추천 (예: 슬랙스 또는 청바지)",
    "outer": "아우터 (예: 얇은 가디건, 필요 없음)",
    "shoes": "신발 추천 (예: 스니커즈)",
    "accessories": "액세서리 (예: 선글라스 필수, 우산 챙기기)",
    "tip": "오늘 날씨 패션 팁 한 줄"
  },
  "alerts": ["주의사항1", "주의사항2"],
  "greeting": "오늘 날씨에 맞는 따뜻한 아침 인사 한 줄",
  "outfits": [
    {
      "label": "코디 스타일 이름 (예: 캐주얼 데일리)",
      "top": "상의 아이템명 (예: 흰 반팔 티셔츠)",
      "bottom": "하의 아이템명 (예: 베이지 슬랙스)",
      "outer": "아우터 아이템명 또는 null (예: 얇은 카디건)",
      "shoes": "신발 (예: 흰 스니커즈)",
      "accessory": "액세서리 (예: 선글라스)",
      "searchQuery": "Unsplash 영어 검색어, 실제 옷 사진 검색용 (예: white casual outfit summer)",
      "topColor": "상의 헥스 색상코드 (예: #ffffff)",
      "bottomColor": "하의 헥스 색상코드 (예: #d4b896)",
      "outerColor": "아우터 헥스 색상코드 또는 null (예: #c8d8c0)",
      "shoesColor": "신발 헥스 색상코드 (예: #f0f0f0)",
      "skinColor": "#f5c9a0",
      "hasOuter": true
    },
    {
      "label": "두 번째 코디 스타일 이름 (예: 세미 포멀)",
      "top": "상의 아이템명",
      "bottom": "하의 아이템명",
      "outer": "아우터 아이템명 또는 null",
      "shoes": "신발",
      "accessory": "액세서리",
      "searchQuery": "Unsplash 영어 검색어 (예: smart casual outfit navy blazer)",
      "topColor": "상의 헥스 색상코드",
      "bottomColor": "하의 헥스 색상코드",
      "outerColor": "아우터 헥스 색상코드 또는 null",
      "shoesColor": "신발 헥스 색상코드",
      "skinColor": "#f5c9a0",
      "hasOuter": false
    }
  ]
}`;
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6", max_tokens: 1200,
      messages: [{ role: "user", content: prompt }]
    }),
  });
  const data = await res.json();
  const txt = (data.content || []).map(c => c.text || "").join("");
  return JSON.parse(txt.replace(/```json|```/g, "").trim());
}

/* ── OutfitCard: 실사 사진 코디 카드 ────────────────────────── */
function OutfitCard({ outfit }) {
  const { label="", top="", bottom="", outer="", shoes="", accessory="", searchQuery="outfit" } = outfit;

  // Unsplash source URL — 무작위 실사 사진 (검색어 기반)
  const q = encodeURIComponent(searchQuery || "fashion outfit");
  const imgUrl = `https://source.unsplash.com/300x420/?${q}`;

  const [imgError, setImgError] = useState(false);
  const fallbackUrl = `https://source.unsplash.com/300x420/?fashion,clothes`;

  return (
    <div style={{ flex: 1, display: "flex", flexDirection: "column" }}>
      {/* 사진 */}
      <div style={{ borderRadius: 14, overflow: "hidden", marginBottom: 8, position: "relative", aspectRatio: "3/4", background: "rgba(255,255,255,0.05)" }}>
        <img
          src={imgError ? fallbackUrl : imgUrl}
          alt={label}
          onError={() => setImgError(true)}
          style={{ width: "100%", height: "100%", objectFit: "cover", display: "block" }}
        />
        {/* 라벨 오버레이 */}
        <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, padding: "24px 10px 8px", background: "linear-gradient(transparent,rgba(0,0,0,0.7))" }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: "#fff", textAlign: "center" }}>{label}</div>
        </div>
      </div>

      {/* 아이템 목록 */}
      <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
        {[
          top        && ["👕", top],
          bottom     && ["👖", bottom],
          outer      && ["🧥", outer],
          shoes      && ["👟", shoes],
          accessory  && ["✨", accessory],
        ].filter(Boolean).map(([e, v]) => (
          <div key={e} style={{ display: "flex", alignItems: "flex-start", gap: 5, background: "rgba(255,255,255,0.04)", borderRadius: 6, padding: "4px 8px" }}>
            <span style={{ fontSize: 10, flexShrink: 0 }}>{e}</span>
            <span style={{ fontSize: 10, color: "rgba(255,255,255,0.65)", lineHeight: "1.4" }}>{v}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function WeatherApp({ onBack }) {
  const now = new Date();
  const hour = now.getHours();
  const isMorning = hour >= 6 && hour < 9;

  const [savedCity, setSavedCity] = useState("");
  const [weather,   setWeather]   = useState(null);
  const [loading,   setLoading]   = useState(false);
  const [error,     setError]     = useState(false);
  const [editCity,  setEditCity]  = useState(false);
  const [cityInput, setCityInput] = useState("");
  const [showPopup, setShowPopup] = useState(false);
  const [wTab,      setWTab]      = useState("weather");
  const [setTab,    setSetTab]    = useState("gps");   // gps | map | text
  const [gpsLoading,setGpsLoading]= useState(false);
  const [gpsError,  setGpsError]  = useState("");
  const [mapCity,   setMapCity]   = useState("");
  const [mapLat,    setMapLat]    = useState(37.5665);
  const [mapLng,    setMapLng]    = useState(126.9780);
  const mapRef = useRef(null);
  const leafletMap = useRef(null);
  const marker = useRef(null);

  // 역지오코딩: 좌표 → 도시명
  const reverseGeocode = async (lat, lng) => {
    try {
      const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=ko`);
      const data = await res.json();
      const addr = data.address;
      return addr.city || addr.town || addr.village || addr.county || addr.state || "알 수 없는 위치";
    } catch { return ""; }
  };

  // GPS 현재 위치
  const getGPS = async () => {
    setGpsLoading(true); setGpsError("");
    if (!navigator.geolocation) { setGpsError("이 기기는 위치 서비스를 지원하지 않아요"); setGpsLoading(false); return; }
    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        const { latitude: lat, longitude: lng } = pos.coords;
        const city = await reverseGeocode(lat, lng);
        if (city) { await applyCity(city); }
        else { setGpsError("위치를 도시명으로 변환하지 못했어요. 직접 입력해주세요."); }
        setGpsLoading(false);
      },
      (err) => {
        setGpsError(err.code === 1 ? "위치 권한이 거부됐어요. 설정에서 허용해주세요." : "위치를 가져오지 못했어요. 다시 시도해주세요.");
        setGpsLoading(false);
      },
      { timeout: 10000 }
    );
  };

  // Leaflet 지도 초기화
  useEffect(() => {
    if (setTab !== "map" || !editCity) return;
    const initMap = () => {
      if (leafletMap.current || !mapRef.current) return;
      if (!window.L) return;
      const map = window.L.map(mapRef.current).setView([mapLat, mapLng], 10);
      window.L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "© OpenStreetMap"
      }).addTo(map);
      const mk = window.L.marker([mapLat, mapLng], {
        icon: window.L.divIcon({ html:"<div style='font-size:28px'>📍</div>", className:"", iconAnchor:[14,28] })
      }).addTo(map);
      marker.current = mk;
      map.on("click", async (e) => {
        const { lat, lng } = e.latlng;
        mk.setLatLng([lat, lng]);
        setMapLat(lat); setMapLng(lng);
        const city = await reverseGeocode(lat, lng);
        setMapCity(city);
      });
      leafletMap.current = map;
    };
    if (window.L) { setTimeout(initMap, 100); }
    else {
      const link = document.createElement("link");
      link.rel = "stylesheet"; link.href = "https://unpkg.com/leaflet@1.9.4/dist/leaflet.css";
      document.head.appendChild(link);
      const script = document.createElement("script");
      script.src = "https://unpkg.com/leaflet@1.9.4/dist/leaflet.js";
      script.onload = () => setTimeout(initMap, 100);
      document.head.appendChild(script);
    }
    return () => { if (leafletMap.current) { leafletMap.current.remove(); leafletMap.current = null; } };
  }, [setTab, editCity]);

  const applyCity = async (city) => {
    setSavedCity(city); setEditCity(false);
    await window.storage.set(WEATHER_KEY, city).catch(() => {});
    fetchWeather(city);
  };

  useEffect(() => {
    window.storage.get(WEATHER_KEY).then(r => {
      if (r && r.value) {
        setSavedCity(r.value);
        fetchWeather(r.value);
      } else {
        // 첫 실행 — GPS 자동 감지 시도
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(
            async (pos) => {
              const city = await reverseGeocode(pos.coords.latitude, pos.coords.longitude);
              if (city) { setSavedCity(city); fetchWeather(city); window.storage.set(WEATHER_KEY, city).catch(()=>{}); }
              else { setEditCity(true); }
            },
            () => setEditCity(true),
            { timeout: 8000 }
          );
        } else { setEditCity(true); }
      }
    }).catch(() => setEditCity(true));
  }, []);

  useEffect(() => {
    if (isMorning && weather) setShowPopup(true);
  }, [weather]);

  const fetchWeather = async (c) => {
    setLoading(true); setError(false);
    try { const w = await fetchWeatherBriefing(c); setWeather(w); }
    catch { setError(true); }
    setLoading(false);
  };

  const saveCity = async () => {
    if (!cityInput.trim()) return;
    await applyCity(cityInput.trim());
    setCityInput("");
  };

  const BG = {
    "맑음":"linear-gradient(160deg,#0ea5e9,#38bdf8,#7dd3fc)",
    "흐림":"linear-gradient(160deg,#475569,#64748b,#94a3b8)",
    "구름":"linear-gradient(160deg,#3b82f6,#60a5fa,#93c5fd)",
    "비":"linear-gradient(160deg,#1e3a5f,#2563eb,#3b82f6)",
    "눈":"linear-gradient(160deg,#e2e8f0,#cbd5e1,#94a3b8)",
    "default":"linear-gradient(160deg,#1a1a3e,#2d2d6e,#1e3a5f)",
  };
  const getBg = () => {
    if (!weather) return BG.default;
    const c = weather.condition || "";
    if (c.includes("맑")) return BG["맑음"];
    if (c.includes("흐")) return BG["흐림"];
    if (c.includes("구름")) return BG["구름"];
    if (c.includes("비")||c.includes("우")) return BG["비"];
    if (c.includes("눈")) return BG["눈"];
    return BG.default;
  };

  return (
    <div style={{ minHeight:"100vh", background:"#0d1117", fontFamily:"'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif", display:"flex", flexDirection:"column" }}>

      {/* Header */}
      <div style={{ background:"rgba(0,0,0,0.4)", padding:"16px 16px 12px", borderBottom:"1px solid rgba(255,255,255,0.08)", display:"flex", alignItems:"center", gap:10, flexShrink:0 }}>
        <button style={S.appHomeBtn} onClick={onBack} title="홈">🏠</button>
        <div style={{ flex:1 }}>
          <div style={{ fontSize:16, fontWeight:800, color:"#fff" }}>🌊 Set Go</div>
          {savedCity && (
            <div style={{ fontSize:11, color:"rgba(255,255,255,0.4)", marginTop:1 }}>
              🌍 {savedCity}
            </div>
          )}
        </div>
        <button
          style={{ background:"rgba(255,255,255,0.08)", border:"1px solid rgba(255,255,255,0.12)", borderRadius:8, color:"rgba(255,255,255,0.5)", fontSize:12, padding:"5px 10px", cursor:"pointer" }}
          onClick={() => { setEditCity(true); setCityInput(savedCity); }}
        >{savedCity ? "🌍 지역 변경" : "🌍 지역 설정"}</button>
      </div>

      {/* Tabs */}
      <div style={{ display:"flex", borderBottom:"1px solid rgba(255,255,255,0.07)", background:"rgba(0,0,0,0.2)", flexShrink:0 }}>
        {[["weather","☀️ 날씨"],["outfit","👗 옷차림"],["alert","💡 Tip"]].map(([v,l])=>(
          <button key={v} style={{ flex:1, padding:"11px 0", background:"transparent", border:"none", borderBottom: wTab===v ? "2px solid #60a5fa" : "2px solid transparent", color: wTab===v ? "#60a5fa" : "rgba(255,255,255,0.35)", fontSize:12, fontWeight: wTab===v ? 700 : 500, cursor:"pointer" }}
            onClick={()=>setWTab(v)}>{l}</button>
        ))}
      </div>

      {/* 🎯 지역 미설정 */}
      {!savedCity && !loading && !editCity && (
        <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"40px 20px", gap:16, textAlign:"center" }}>
          <div style={{ fontSize:52 }}>🌍</div>
          <div style={{ color:"#fff", fontSize:16, fontWeight:700 }}>지역을 설정해주세요</div>
          <div style={{ color:"rgba(255,255,255,0.4)", fontSize:13, lineHeight:"1.7" }}>날씨를 확인할 지역을 입력하면<br/>날씨·옷차림 정보를 바로 볼 수 있어요</div>
          <button style={{ background:"linear-gradient(135deg,#3b82f6,#60a5fa)", border:"none", borderRadius:14, color:"#fff", fontSize:14, fontWeight:700, padding:"13px 28px", cursor:"pointer", marginTop:8 }}
            onClick={() => { setEditCity(true); setCityInput(""); }}>🌍 지역 설정하기</button>
        </div>
      )}

      {/* 로딩 */}
      {loading && (
        <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:12 }}>
          <div style={{ fontSize:44 }}>🌊</div>
          <div style={{ color:"rgba(255,255,255,0.45)", fontSize:13 }}>날씨 정보를 불러오는 중...</div>
        </div>
      )}

      {/* 에러 */}
      {error && !loading && (
        <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:12, padding:"20px" }}>
          <div style={{ fontSize:40 }}>😞</div>
          <div style={{ color:"rgba(255,255,255,0.5)", fontSize:13, textAlign:"center" }}>날씨 정보를 불러오지 못했어요</div>
          <button style={{ background:"rgba(96,165,250,0.2)", border:"1px solid rgba(96,165,250,0.3)", borderRadius:10, color:"#60a5fa", fontSize:13, fontWeight:600, padding:"10px 20px", cursor:"pointer" }}
            onClick={() => fetchWeather(savedCity)}>다시 시도</button>
        </div>
      )}

      {/* 날씨 콘텐츠 */}
      {weather && !loading && !error && (
        <div style={{ flex:1, overflowY:"auto" }}>

          {/* 탭: 날씨 */}
          {wTab === "weather" && (
            <>
              <div style={{ background:getBg(), padding:"22px 20px 20px" }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
                  <div>
                    <div style={{ fontSize:11, color:"rgba(255,255,255,0.65)", letterSpacing:1 }}>🌍 {weather.city}</div>
                    <div style={{ fontSize:10, color:"rgba(255,255,255,0.4)", marginTop:2 }}>{weather.date}</div>
                  </div>
                  <button style={{ background:"rgba(255,255,255,0.15)", border:"none", borderRadius:8, color:"#fff", fontSize:11, padding:"5px 10px", cursor:"pointer" }}
                    onClick={()=>fetchWeather(savedCity)}>↻ 새로고침</button>
                </div>
                <div style={{ display:"flex", alignItems:"center", gap:14, marginBottom:16 }}>
                  <div style={{ fontSize:60, lineHeight:1 }}>{weather.conditionEmoji}</div>
                  <div>
                    <div style={{ fontSize:42, fontWeight:900, color:"#fff", letterSpacing:"-2px", lineHeight:1 }}>{weather.temp}</div>
                    <div style={{ fontSize:13, color:"rgba(255,255,255,0.75)", marginTop:4 }}>{weather.condition}</div>
                    <div style={{ fontSize:11, color:"rgba(255,255,255,0.45)", marginTop:2 }}>체감 {weather.feels}</div>
                  </div>
                </div>
                <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:8 }}>
                  {[["💧","습도",weather.humidity],["💨","바람",weather.wind],["🌅","일출",weather.sunrise],["🌇","일몰",weather.sunset]].map(([e,l,v])=> v ? (
                    <div key={l} style={{ background:"rgba(0,0,0,0.2)", borderRadius:10, padding:"8px 4px", textAlign:"center" }}>
                      <div style={{ fontSize:16, marginBottom:2 }}>{e}</div>
                      <div style={{ fontSize:9, color:"rgba(255,255,255,0.4)", marginBottom:3 }}>{l}</div>
                      <div style={{ fontSize:11, fontWeight:700, color:"#fff" }}>{v}</div>
                    </div>
                  ) : null)}
                </div>
                {weather.greeting && (
                  <div style={{ marginTop:12, padding:"9px 12px", background:"rgba(255,255,255,0.1)", borderRadius:10, fontSize:12, color:"rgba(255,255,255,0.85)", lineHeight:"1.6" }}>
                    {weather.greeting}
                  </div>
                )}
              </div>
              <div style={{ padding:"14px 16px" }}>
                <div style={WS.secTitle}>⏰ 시간대별</div>
                <div style={{ display:"flex", gap:8, marginBottom:14 }}>
                  {[["🌅","오전",weather.morning],["☀️","오후",weather.afternoon],["🌙","저녁",weather.evening]].map(([e,t,v])=> v ? (
                    <div key={t} style={{ flex:1, background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:12, padding:"10px 6px", textAlign:"center" }}>
                      <div style={{ fontSize:18, marginBottom:4 }}>{e}</div>
                      <div style={{ fontSize:10, color:"rgba(255,255,255,0.4)", marginBottom:5 }}>{t}</div>
                      <div style={{ fontSize:11, color:"rgba(255,255,255,0.75)", lineHeight:"1.4" }}>{v}</div>
                    </div>
                  ) : null)}
                </div>
                <button style={{ width:"100%", padding:11, background:"rgba(96,165,250,0.08)", border:"1px solid rgba(96,165,250,0.18)", borderRadius:12, color:"#60a5fa", fontSize:12, fontWeight:600, cursor:"pointer" }}
                  onClick={()=>fetchWeather(savedCity)}>🔄 날씨 업데이트</button>
              </div>
            </>
          )}

          {/* 탭: 옷차림 */}
          {wTab === "outfit" && (
            <div style={{ padding:"16px" }}>
              <div style={WS.secTitle}>👗 오늘의 옷차림 추천</div>
              {weather.outfits?.slice(0,2).map((o,i)=>(
                <div key={i} style={{ background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:16, padding:"16px", marginBottom:12 }}>

/* ── 화면 상태: 모듈 레벨 (코드 로드 시 항상 "home"으로 초기화) ── */

/* ═══════════════════════════════════════════════════════════════
   Inner App (화면 라우팅 담당 — key로 강제 리마운트 가능)
═══════════════════════════════════════════════════════════════ */
function InnerApp({ onGoHome, initialScreen = "planner" }) {
  const [screen,  setScreen]  = useState(initialScreen);
  const [all,     setAll]     = useState(null);
  const [view,    setView]    = useState("cal");
  const [selKey,  setSelKey]  = useState(null);

  const firstRender = useRef(true);
  useEffect(() => { loadAll().then(setAll); }, []);
  useEffect(() => {
    if (all === null) return;
    if (firstRender.current) { firstRender.current = false; return; }
    saveAll(all);
  }, [all]);

  const patchDay = (key, patch) => {
    setAll((prev) => {
      const cur = (prev && prev[key]) ? { ...mkDay(), ...prev[key] } : mkDay();
      return { ...prev, [key]: { ...cur, ...patch } };
    });
  };

  const openDay = (key) => { setSelKey(key); setView("day"); };

  if (all === null) {
    return (
      <div style={{ minHeight: "100vh", background: "linear-gradient(135deg,#0f0c29,#1a1a3e,#0f3460)", display: "flex", alignItems: "center", justifyContent: "center" }}>
        <div style={{ color: "rgba(255,255,255,0.4)", fontSize: 14 }}>불러오는 중...</div>
      </div>
    );
  }

  if (screen === "weather") return <WeatherApp onBack={onGoHome} />;

  if (screen === "opic") return (
    <div style={S.root}>
      <div style={{ ...S.phone, background: "#0a0f1e" }}>
        <OPIcTool onBack={onGoHome} />
      </div>
      <style>{`@keyframes blink{0%,100%{opacity:.2;transform:scale(.7)}50%{opacity:1;transform:scale(1)}}`}</style>
    </div>
  );

  // planner (default)
  return (
    <div style={S.root}>
      <div style={S.phone}>
        {view === "cal" && <CalendarView all={all} onOpenDay={openDay} onGoLedger={() => setView("ledger")} onGoHome={onGoHome} />}
        {view === "day" && selKey && <DayView dayKey={selKey} all={all} patchDay={patchDay} onBack={() => setView("cal")} />}
        {view === "ledger" && <LedgerView all={all} onBack={() => setView("cal")} onOpenDay={openDay} />}
      </div>
      <style>{`@keyframes blink{0%,100%{opacity:.2;transform:scale(.7)}50%{opacity:1;transform:scale(1)}}`}</style>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   Root App — 항상 홈에서 시작, InnerApp을 key로 리마운트
═══════════════════════════════════════════════════════════════ */
function App() {
  // ref는 state와 달리 렌더와 무관 — 항상 첫 렌더 시 true
  const isHomeRef  = useRef(true);
  const [tick,     setTick]    = useState(0); // 리렌더 트리거용
  const [innerKey, setInnerKey] = useState(0);
  const [dest,     setDest]    = useState("planner");

  const showHome = isHomeRef.current;

  const goTo = (d) => {
    isHomeRef.current = false;
    setDest(d);
    setTick(t => t + 1);
  };
  const goHome = () => {
    isHomeRef.current = true;
    setInnerKey(k => k + 1);
    setTick(t => t + 1);
  };

  if (showHome) {
    return (
      <HomeScreen
        onEnterPlanner={() => goTo("planner")}
        onEnterOPIc={()    => goTo("opic")}
        onEnterWeather={()  => goTo("weather")}
      />
    );
  }

  return <InnerApp key={innerKey} onGoHome={goHome} initialScreen={dest} />;
}
