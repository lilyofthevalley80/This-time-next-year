    const { useState, useEffect, useRef, useCallback } = React;

    // window.storage polyfill using localStorage
    window.storage = {
      get: (key) => {
        return new Promise((resolve) => {
          try {
            const val = localStorage.getItem('ttny_' + key);
            if (val !== null) resolve({ key, value: val });
            else resolve(null);
          } catch { resolve(null); }
        });
      },
      set: (key, value) => {
        return new Promise((resolve) => {
          try {
            localStorage.setItem('ttny_' + key, value);
            resolve({ key, value });
          } catch { resolve(null); }
        });
      },
      delete: (key) => {
        return new Promise((resolve) => {
          try {
            localStorage.removeItem('ttny_' + key);
            resolve({ key, deleted: true });
          } catch { resolve(null); }
        });
      },
      list: (prefix) => {
        return new Promise((resolve) => {
          try {
            const keys = Object.keys(localStorage)
              .filter(k => k.startsWith('ttny_' + (prefix || '')))
              .map(k => k.replace('ttny_', ''));
            resolve({ keys });
          } catch { resolve({ keys: [] }); }
        });
      }
    };


/* ─── utils ─────────────────────────────────────────────────── */
const toKey = (y, m, d) =>
  `${y}-${String(m + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;

const parseKey = (key) => {
  const parts = key.split("-").map(Number);
  return { y: parts[0], m: parts[1] - 1, d: parts[2] };
};

const todayKey = (() => {
  const n = new Date();
  return toKey(n.getFullYear(), n.getMonth(), n.getDate());
})();

const fmt = (n) => Math.abs(n).toLocaleString("ko-KR");
const DAY_NAMES = ["일", "월", "화", "수", "목", "금", "토"];

const getMoodEmoji = (done, total) => {
  if (total === 0) return null;
  const p = done / total;
  if (p === 1) return "🌟";
  if (p >= 0.7) return "😊";
  if (p >= 0.4) return "🙂";
  return "💪";
};

/* ─── finance helpers ───────────────────────────────────────── */
const sumIncome    = (day) => (day.income   || []).reduce((s, x) => s + Number(x.amount), 0);
const sumExpense   = (day) => (day.expenses || []).reduce((s, x) => {
  const subs = x.subItems || [];
  return s + (subs.length > 0 ? subs.reduce((ss, si) => ss + Number(si.amount), 0) : Number(x.amount));
}, 0);
const sumEssential = (day) => (day.expenses || []).reduce((s, x) => {
  const subs = x.subItems || [];
  if (subs.length > 0) return s + subs.filter((si) => !si.optional).reduce((ss, si) => ss + Number(si.amount), 0);
  return s + (!x.optional ? Number(x.amount) : 0);
}, 0);
const sumOptional  = (day) => (day.expenses || []).reduce((s, x) => {
  const subs = x.subItems || [];
  if (subs.length > 0) return s + subs.filter((si) => si.optional).reduce((ss, si) => ss + Number(si.amount), 0);
  return s + (x.optional ? Number(x.amount) : 0);
}, 0);

/* ─── AI question ───────────────────────────────────────────── */
async function fetchQuestion(dateKey) {
  const doy = Math.floor((new Date(dateKey) - new Date(new Date(dateKey).getFullYear(), 0, 0)) / 86400000);
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6", max_tokens: 200,
      messages: [{ role: "user", content:
        `날짜(${dateKey},연중${doy}번째)에 맞는 자기성찰 질문 하나를 한국어로.\n` +
        `조건:한문장30자이내,일상·관계·성장·감정,쉽게답할수있되생각자극,${doy}를시드로매일다른주제.\n` +
        `JSON만(다른텍스트없이):{"question":"질문","hint":"10자이내힌트"}`
      }],
    }),
  });
  const data = await res.json();
  const txt = (data.content || []).map((c) => c.text || "").join("");
  return JSON.parse(txt.replace(/```json|```/g, "").trim());
}

/* ─── storage ───────────────────────────────────────────────── */
const SKEY = "planner-v6";
async function loadAll() {
  try {
    const r = await window.storage.get(SKEY);
    return r ? JSON.parse(r.value) : {};
  } catch (_) { return {}; }
}
async function saveAll(data) {
  try { await window.storage.set(SKEY, JSON.stringify(data)); } catch (_) {}
}

/* ─── AddSubRow: inline sub-item adder ──────────────────────── */
function AddSubRow({ onAdd }) {
  const [open,     setOpen]     = useState(false);
  const [desc,     setDesc]     = useState("");
  const [amount,   setAmount]   = useState("");
  const [optional, setOptional] = useState(false);
  const [cat,      setCat]      = useState("etc_ex");

  const commit = () => {
    const amt = parseInt(String(amount).replace(/,/g, ""), 10);
    if (!desc.trim() || isNaN(amt) || amt <= 0) return;
    onAdd(desc.trim(), amt, optional, cat);
    setDesc(""); setAmount(""); setOptional(false); setCat("etc_ex"); setOpen(false);
  };

  if (!open) return (
    <button style={S.addSubBtn} onClick={() => setOpen(true)}>+ 세부 항목 추가</button>
  );

  return (
    <div style={S.subForm}>
      {/* Row 1: category */}
      <select style={{ ...S.inp, fontSize: 12 }} value={cat} onChange={(e) => setCat(e.target.value)}>
        {EXPENSE_CATS.map((c) => <option key={c.id} value={c.id}>{c.emoji} {c.label}</option>)}
      </select>
      {/* Row 2: toggle + desc + amount */}
      <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
        <button
          style={{ ...S.toggleIcon, fontSize: 20, flexShrink: 0 }}
          onClick={() => setOptional((v) => !v)}
          title="클릭해서 필수/불필요 전환"
        >
          {optional ? "💸" : "😊"}
        </button>
        <input style={{ ...S.inp, flex: 1, fontSize: 12 }} placeholder="세부 항목명..." value={desc} onChange={(e) => setDesc(e.target.value)} onKeyDown={(e) => e.key === "Enter" && commit()} />
        <input style={{ ...S.inp, fontSize: 12, width: 80, flex: "none", padding: "10px 8px" }} placeholder="금액" type="number" value={amount} onChange={(e) => setAmount(e.target.value)} onKeyDown={(e) => e.key === "Enter" && commit()} />
      </div>
      {/* Row 3: buttons */}
      <div style={{ display: "flex", gap: 6 }}>
        <button style={{ ...S.evSubmit, flex: 1, padding: "7px", fontSize: 12, background: "rgba(248,113,113,0.15)", borderColor: "rgba(248,113,113,0.35)", color: "#f87171" }} onClick={commit}>추가</button>
        <button style={{ ...S.evSubmit, flex: "none", padding: "7px 12px", fontSize: 12, background: "transparent", borderColor: "rgba(255,255,255,0.1)", color: "rgba(255,255,255,0.3)" }} onClick={() => setOpen(false)}>취소</button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   CalendarView
═══════════════════════════════════════════════════════════════ */
function CalendarView({ all, onOpenDay, onGoLedger, onGoHome }) {
  const now = new Date();
  const [calYear,  setCalYear]  = useState(now.getFullYear());
  const [calMonth, setCalMonth] = useState(now.getMonth());

  const firstDow  = new Date(calYear, calMonth, 1).getDay();
  const daysInMon = new Date(calYear, calMonth + 1, 0).getDate();
  const cells = [];
  for (let i = 0; i < firstDow; i++) cells.push(null);
  for (let d = 1; d <= daysInMon; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  const prevMon = () => {
    if (calMonth === 0) { setCalYear((y) => y - 1); setCalMonth(11); }
    else setCalMonth((m) => m - 1);
  };
  const nextMon = () => {
    if (calMonth === 11) { setCalYear((y) => y + 1); setCalMonth(0); }
    else setCalMonth((m) => m + 1);
  };

  return (
    <>
      <div style={S.calHdr}>
        <div style={S.calHdrTop}>
          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
            {onGoHome && <button style={S.appHomeBtn} onClick={onGoHome} title="홈">🏠</button>}
            <span style={S.logo}>✦ Daily</span>
          </div>
          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
            <button style={S.todayBtn} onClick={() => { setCalYear(now.getFullYear()); setCalMonth(now.getMonth()); }}>오늘</button>
            <button style={S.ledgerBtn} onClick={onGoLedger}>💳</button>
          </div>
        </div>
        <div style={S.monthNav}>
          <button style={S.navBtn} onClick={prevMon}>‹</button>
          <span style={S.monthLbl}>{calYear}년 {calMonth + 1}월</span>
          <button style={S.navBtn} onClick={nextMon}>›</button>
        </div>
      </div>

      <div style={S.calBody}>
        <div style={S.dayNames}>
          {DAY_NAMES.map((d, i) => (
            <div key={d} style={{ ...S.dayName, color: i === 0 ? "#f87171" : i === 6 ? "#60a5fa" : "rgba(255,255,255,0.3)" }}>{d}</div>
          ))}
        </div>

        <div style={S.grid}>
          {cells.map((d, i) => {
            if (!d) return <div key={"e" + i} style={S.emptyCell} />;
            const key   = toKey(calYear, calMonth, d);
            const dayD  = all[key];
            const isToday = key === todayKey;
            const dow   = (firstDow + d - 1) % 7;
            const done  = dayD?.tasks?.filter((t) => t.done).length ?? 0;
            const total = dayD?.tasks?.length ?? 0;
            const mood  = dayD ? getMoodEmoji(done, total) : null;
            const evs   = dayD?.events || [];
            const comp  = dayD?.completed === true;
            const hasInc = (dayD?.income   || []).length > 0;
            const hasExp = (dayD?.expenses || []).length > 0;
            const net   = dayD ? sumIncome(dayD) - sumExpense(dayD) : null;
            const isZeroExp = dayD && sumExpense(dayD) === 0 && (hasInc || total > 0 || evs.length > 0 || dayD.gratitude || dayD.questionAnswer);

            return (
              <div
                key={key}
                style={{ ...S.cell, ...(isToday ? S.cellToday : {}), ...(comp ? S.cellDone : {}), ...(isZeroExp ? S.cellZeroExp : {}) }}
                onClick={() => onOpenDay(key)}
              >
                <span style={{
                  ...S.cellNum,
                  color: isToday ? "#c084fc" : dow === 0 ? "#f87171" : dow === 6 ? "#60a5fa" : "rgba(255,255,255,0.75)",
                  fontWeight: isToday ? 800 : 500,
                }}>{d}</span>

                {mood && <span style={S.cellMood}>{mood}</span>}
                {!mood && dayD && (total > 0 || evs.length > 0 || dayD.gratitude || dayD.questionAnswer) && (
                  <div style={S.cellDot} />
                )}
                {evs.length > 0 && (
                  <div style={S.cellEvRow}>
                    {evs.slice(0, 3).map((ev) => (
                      <div key={ev.id} style={{ ...S.cellEvDot, background: getECat(ev.category).color }} />
                    ))}
                  </div>
                )}
                {isZeroExp && (
                  <span style={S.zeroExpMark}>🏆</span>
                )}
                {!isZeroExp && (hasInc || hasExp) && net !== null && (
                  <div style={{ ...S.cellMoney, color: net > 0 ? "#4ade80" : net < 0 ? "#f87171" : "rgba(255,255,255,0.3)" }}>
                    {net > 0 ? "+" : net < 0 ? "-" : ""}{Math.abs(net) >= 10000 ? Math.floor(Math.abs(net) / 10000) + "만" : "●"}
                  </div>
                )}
                {comp && <span style={S.compMark}>✓</span>}
              </div>
            );
          })}
        </div>

        <div style={S.legend}>
          <div style={S.lgItem}><div style={{ ...S.lgDot, background: "#c084fc" }} /><span>오늘</span></div>
          <div style={S.lgItem}><span>🌟</span><span>완료100%</span></div>
          <div style={S.lgItem}><span style={{ color: "#86efac", fontWeight: 700 }}>✓</span><span>마무리</span></div>
          <div style={S.lgItem}><span>🏆</span><span>지출 0원</span></div>
          <div style={S.lgItem}><span style={{ color: "#4ade80", fontSize: 11 }}>+만</span><span>수지</span></div>
        </div>
      </div>
    </>
  );
}

/* ═══════════════════════════════════════════════════════════════
   ReceiptModal — 영수증 스캔 (붙여넣기 / 드래그 / 파일선택)
═══════════════════════════════════════════════════════════════ */
function ReceiptModal({ onClose, scanLoading, scanItems, scanDone, setScanItems, onAnalyze, onApply, fmt, getExpCat }) {
  const [dragOver, setDragOver] = useState(false);
  const [preview,  setPreview]  = useState(null);
  const dropRef = useRef(null);

  // 클립보드 붙여넣기
  useEffect(() => {
    const onPaste = (e) => {
      const items = e.clipboardData?.items || [];
      for (const item of items) {
        if (item.type.startsWith("image/")) {
          const file = item.getAsFile();
          if (file) { setPreview(URL.createObjectURL(file)); onAnalyze(file); }
          break;
        }
      }
    };
    window.addEventListener("paste", onPaste);
    return () => window.removeEventListener("paste", onPaste);
  }, []);

  const handleFile = (file) => {
    if (!file || !file.type.startsWith("image/")) return;
    setPreview(URL.createObjectURL(file));
    onAnalyze(file);
  };

  const onDrop = (e) => {
    e.preventDefault(); setDragOver(false);
    const file = e.dataTransfer.files[0];
    if (file) handleFile(file);
  };

  const selCount = scanItems.filter(i => i.selected).length;
  const selTotal = scanItems.filter(i => i.selected).reduce((s, i) => s + i.amount, 0);

  return (
    <div style={S.overlay}>
      <div style={{ background:"#111827", borderRadius:24, width:"calc(100% - 24px)", maxWidth:370, maxHeight:"88vh", display:"flex", flexDirection:"column", border:"1px solid rgba(251,191,36,0.25)", overflow:"hidden", boxShadow:"0 24px 60px rgba(0,0,0,0.7)" }}>

        {/* Header */}
        <div style={{ padding:"16px 18px 12px", borderBottom:"1px solid rgba(255,255,255,0.07)", display:"flex", justifyContent:"space-between", alignItems:"center", flexShrink:0 }}>
          <div>
            <div style={{ fontSize:15, fontWeight:700, color:"#fff" }}>📷 영수증 스캔</div>
            <div style={{ fontSize:11, color:"rgba(255,255,255,0.35)", marginTop:2 }}>이미지를 붙여넣거나 파일로 선택하세요</div>
          </div>
          <button style={{ background:"rgba(255,255,255,0.08)", border:"none", borderRadius:8, color:"rgba(255,255,255,0.5)", fontSize:18, width:30, height:30, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }} onClick={onClose}>×</button>
        </div>

        <div style={{ flex:1, overflowY:"auto", padding:"14px 18px" }}>

          {/* 사용 방법 안내 */}
          {!scanLoading && !scanDone && (
            <>
              <div style={{ background:"rgba(251,191,36,0.07)", border:"1px solid rgba(251,191,36,0.18)", borderRadius:12, padding:"12px 14px", marginBottom:14, fontSize:12, color:"rgba(255,255,255,0.55)", lineHeight:"1.8" }}>
                <b style={{ color:"#fbbf24" }}>📷 카메라 촬영</b> — 기기에 따라 카메라가 바로 열릴 수 있어요<br/>
                <b style={{ color:"#fbbf24" }}>🖼 갤러리 선택</b> — 이미 찍은 영수증 사진 선택<br/>
                <b style={{ color:"#fbbf24" }}>📋 붙여넣기</b> — 사진 복사 후 Ctrl+V 또는 길게 누르기
              </div>

              {/* 붙여넣기 영역 */}
              <div
                ref={dropRef}
                onDragOver={e => { e.preventDefault(); setDragOver(true); }}
                onDragLeave={() => setDragOver(false)}
                onDrop={onDrop}
                style={{ border:`2px dashed ${dragOver ? "#fbbf24" : "rgba(255,255,255,0.1)"}`, borderRadius:14, padding:"20px", textAlign:"center", background: dragOver ? "rgba(251,191,36,0.06)" : "rgba(255,255,255,0.02)", marginBottom:10, transition:"all .15s" }}
              >
                <div style={{ fontSize:11, color:"rgba(255,255,255,0.25)" }}>📋 이미지 붙여넣기 또는 드래그</div>
              </div>

              {/* 파일 선택 버튼 */}
              <div style={{ display:"flex", gap:8, marginTop:8 }}>
                {/* 카메라 직접 촬영 시도 */}
                <label style={{ flex:1, cursor:"pointer" }}>
                  <div style={{ background:"linear-gradient(135deg,rgba(251,191,36,0.2),rgba(251,191,36,0.1))", border:"1px solid rgba(251,191,36,0.35)", borderRadius:12, padding:"13px", textAlign:"center", color:"#fbbf24", fontSize:13, fontWeight:700 }}>
                    📷 카메라 촬영
                  </div>
                  <input type="file" accept="image/*" capture="environment" style={{ display:"none" }}
                    onChange={e => { if (e.target.files[0]) handleFile(e.target.files[0]); }} />
                </label>
                {/* 갤러리 선택 */}
                <label style={{ flex:1, cursor:"pointer" }}>
                  <div style={{ background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.12)", borderRadius:12, padding:"13px", textAlign:"center", color:"rgba(255,255,255,0.55)", fontSize:13, fontWeight:600 }}>
                    🖼 갤러리 선택
                  </div>
                  <input type="file" accept="image/*" style={{ display:"none" }}
                    onChange={e => { if (e.target.files[0]) handleFile(e.target.files[0]); }} />

              <div style={{ color:"rgba(255,255,255,0.25)", fontSize:11 }}>품목과 금액을 읽고 있어요</div>

                  <button style={{ background:"rgba(251,191,36,0.15)", border:"1px solid rgba(251,191,36,0.3)", borderRadius:10, padding:"9px 16px", color:"#fbbf24", fontSize:13, fontWeight:600, cursor:"pointer" }}

                <>
                  <div style={{ fontSize:12, color:"rgba(255,255,255,0.4)", marginBottom:10 }}>
                    ✓ {selCount}개 선택 · 필수/불필요 토글 가능
                  </div>
                  {scanItems.map((item, idx) => {
                    const cat = getExpCat(item.category);
                    return (
                      <div key={item.id} style={{ display:"flex", alignItems:"center", gap:8, background: item.selected ? "rgba(255,255,255,0.06)" : "rgba(255,255,255,0.02)", border:`1px solid ${item.selected ? "rgba(255,255,255,0.12)" : "rgba(255,255,255,0.04)"}`, borderRadius:12, padding:"9px 11px", marginBottom:7 }}>
                        <button
                          style={{ width:20, height:20, borderRadius:5, border:`2px solid ${item.selected ? "#4ade80" : "rgba(255,255,255,0.2)"}`, background: item.selected ? "rgba(74,222,128,0.2)" : "transparent", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, padding:0 }}
                          onClick={() => setScanItems(prev => prev.map((it,i) => i===idx ? {...it, selected:!it.selected} : it))}
                        >{item.selected && <span style={{ color:"#4ade80", fontSize:11, fontWeight:700 }}>✓</span>}</button>
                        <span style={{ fontSize:15, flexShrink:0 }}>{cat.emoji}</span>
                        <span style={{ flex:1, fontSize:12, color: item.selected ? "rgba(255,255,255,0.9)" : "rgba(255,255,255,0.3)" }}>{item.desc}</span>
                        <span style={{ color:"#f87171", fontSize:13, fontWeight:700, flexShrink:0 }}>-{fmt(item.amount)}</span>
                        <button
                          style={{ fontSize:15, background:"transparent", border:"none", cursor:"pointer", flexShrink:0, padding:"0 1px" }}
                          onClick={() => setScanItems(prev => prev.map((it,i) => i===idx ? {...it, optional:!it.optional} : it))}

                      </div>

                  })}
                  <div style={{ display:"flex", justifyContent:"space-between", padding:"10px 2px", borderTop:"1px solid rgba(255,255,255,0.07)", marginTop:4 }}>
                    <span style={{ fontSize:12, color:"rgba(255,255,255,0.35)" }}>선택 합계</span>
                    <span style={{ fontSize:15, fontWeight:800, color:"#f87171" }}>-{fmt(selTotal)}원</span>
                  </div>

            </>

        </div>

        {/* Footer */}
        {scanDone && scanItems.length > 0 && (
          <div style={{ padding:"12px 18px 18px", borderTop:"1px solid rgba(255,255,255,0.07)", flexShrink:0, display:"flex", gap:8 }}>

              onClick={onClose}

        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   DefaultTaskManager — 기본 할 일 관리
═══════════════════════════════════════════════════════════════ */
const DEFAULT_TASKS_KEY = "planner-default-tasks";

const PRESET_DEFAULTS = [
  "아침 루틴 (세안·양치·스트레칭)",
  "하루 물 2L 마시기",
  "점심 30분 산책",
  "업무 이메일 확인",
  "저녁 독서 20분",
];

function DefaultTaskManager({ onClose, onApply }) {
  const [screen,   setScreen]   = useState("apply");  // "apply" | "settings"
  const [defaults, setDefaults] = useState([]);
  const [selected, setSelected] = useState({});
  const [newItem,  setNewItem]  = useState("");
  const [editIdx,  setEditIdx]  = useState(null);     // 수정 중인 인덱스
  const [editText, setEditText] = useState("");
  const [loaded,   setLoaded]   = useState(false);

  useEffect(() => {
    window.storage.get(DEFAULT_TASKS_KEY)
      .then(r => {
        const list = r ? JSON.parse(r.value) : PRESET_DEFAULTS;
        initList(list);
      })
      .catch(() => initList(PRESET_DEFAULTS));
  }, []);

  const initList = (list) => {
    setDefaults(list);
    const sel = {};
    list.forEach((_, i) => { sel[i] = true; });
    setSelected(sel);
    setLoaded(true);
  };

  const persist = async (list) => {
    setDefaults(list);
    await window.storage.set(DEFAULT_TASKS_KEY, JSON.stringify(list)).catch(() => {});
  };

  // ── 설정 화면: 추가 ──
  const addItem = () => {
    if (!newItem.trim()) return;
    const next = [...defaults, newItem.trim()];
    persist(next);
    setSelected(s => ({ ...s, [next.length - 1]: true }));
    setNewItem("");
  };

  // ── 설정 화면: 수정 시작 ──
  const startEdit = (idx) => {
    setEditIdx(idx);
    setEditText(defaults[idx]);
  };

  // ── 설정 화면: 수정 저장 ──
  const saveEdit = () => {
    if (!editText.trim()) { setEditIdx(null); return; }
    const next = defaults.map((d, i) => i === editIdx ? editText.trim() : d);
    persist(next);
    setEditIdx(null);
    setEditText("");
  };

  // ── 설정 화면: 삭제 ──
  const delItem = (idx) => {
    const next = defaults.filter((_, i) => i !== idx);
    const newSel = {};
    next.forEach((_, i) => { newSel[i] = selected[i < idx ? i : i + 1]; });
    setSelected(newSel);
    persist(next);
  };

  // ── 적용 화면: 선택 토글 ──
  const toggleSel = (idx) => setSelected(s => ({ ...s, [idx]: !s[idx] }));
  const selAll    = () => { const s = {}; defaults.forEach((_, i) => { s[i] = true; }); setSelected(s); };
  const selNone   = () => setSelected({});

  const applySelected = () => {
    const items = defaults.filter((_, i) => selected[i]);
    onApply(items);
    onClose();
  };

  const selCount = Object.values(selected).filter(Boolean).length;

  if (!loaded) return null;

  return (
    <div style={S.overlay}>
      <div style={S.dtModal}>

        {/* ── Header ── */}
        <div style={S.dtHeader}>
          <div style={{ display: "flex", gap: 0, background: "rgba(255,255,255,0.06)", borderRadius: 10, padding: 3 }}>
            <button
              style={{ ...S.dtTab, ...(screen === "apply" ? S.dtTabA : {}) }}
              onClick={() => setScreen("apply")}
            >✓ 적용</button>
            <button
              style={{ ...S.dtTab, ...(screen === "settings" ? S.dtTabA : {}) }}
              onClick={() => { setScreen("settings"); setEditIdx(null); setNewItem(""); }}
            >⚙ 목록 관리</button>
          </div>
          <button style={S.dtClose} onClick={onClose}>×</button>
        </div>

        {/* ══ 적용 화면 ══ */}
        {screen === "apply" && (
          <>
            <div style={S.dtSelRow}>
              <span style={{ fontSize: 12, color: "rgba(255,255,255,0.4)" }}>{selCount}개 선택됨</span>
              <div style={{ display: "flex", gap: 8 }}>
                <button style={S.dtSelBtn} onClick={selAll}>전체</button>
                <button style={S.dtSelBtn} onClick={selNone}>해제</button>
              </div>
            </div>

            <div style={S.dtList}>
              {defaults.length === 0 && (
                <div style={{ textAlign: "center", color: "rgba(255,255,255,0.2)", fontSize: 13, padding: "24px 0" }}>
                  기본 할 일이 없어요<br/>
                  <button style={{ marginTop: 10, background: "rgba(192,132,252,0.12)", border: "1px solid rgba(192,132,252,0.25)", borderRadius: 8, color: "#c084fc", fontSize: 12, padding: "6px 14px", cursor: "pointer" }} onClick={() => setScreen("settings")}>
                    + 목록 관리에서 추가하기
                  </button>
                </div>
              )}
              {defaults.map((item, idx) => (
                <div key={idx} style={{ ...S.dtItem, ...(selected[idx] ? S.dtItemSel : {}) }}>
                  <button
                    style={{ ...S.dtChk, ...(selected[idx] ? S.dtChkOn : {}) }}
                    onClick={() => toggleSel(idx)}
                  >
                    {selected[idx] && <span style={{ color: "#c084fc", fontSize: 11, fontWeight: 700 }}>✓</span>}
                  </button>
                  <span style={{ flex: 1, fontSize: 13, color: selected[idx] ? "rgba(255,255,255,0.9)" : "rgba(255,255,255,0.45)" }}>
                    {item}
                  </span>
                </div>
              ))}
            </div>

            <div style={{ padding: "0 18px 18px", flexShrink: 0 }}>
              <button
                style={{ ...S.compBtn, opacity: selCount === 0 ? 0.4 : 1, marginTop: 0 }}
                disabled={selCount === 0}
                onClick={applySelected}
              >
                선택한 {selCount}개 오늘 할 일에 추가 ✓
              </button>
            </div>
          </>
        )}

        {/* ══ 설정 화면 ══ */}
        {screen === "settings" && (
          <>
            <div style={{ padding: "10px 18px 6px", flexShrink: 0 }}>
              <div style={{ fontSize: 11, color: "rgba(255,255,255,0.3)", marginBottom: 8 }}>
                항목을 탭해서 수정 · × 로 삭제할 수 있어요
              </div>
              {/* 추가 입력 */}
              <div style={{ display: "flex", gap: 8, marginBottom: 4 }}>
                <input
                  style={{ ...S.inp, flex: 1, marginBottom: 0, fontSize: 12 }}
                  placeholder="새 항목 추가..."
                  value={newItem}
                  onChange={e => setNewItem(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && addItem()}
                />
                <button style={{ ...S.addBtn, width: 36, height: 36, fontSize: 18, flexShrink: 0 }} onClick={addItem}>+</button>
              </div>
            </div>

            <div style={{ ...S.dtList, paddingTop: 4 }}>
              {defaults.length === 0 && (
                <div style={{ textAlign: "center", color: "rgba(255,255,255,0.2)", fontSize: 13, padding: "24px 0" }}>
                  위에서 첫 번째 항목을 추가해보세요
                </div>
              )}
              {defaults.map((item, idx) => (
                <div key={idx} style={{ ...S.dtItem, flexDirection: "column", alignItems: "stretch", gap: 0 }}>
                  {editIdx === idx ? (
                    // 수정 모드
                    <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                      <input
                        style={{ ...S.inp, flex: 1, marginBottom: 0, fontSize: 12, padding: "7px 10px" }}
                        value={editText}
                        onChange={e => setEditText(e.target.value)}
                        onKeyDown={e => { if (e.key === "Enter") saveEdit(); if (e.key === "Escape") setEditIdx(null); }}
                        autoFocus
                      />
                      <button style={{ background: "rgba(192,132,252,0.2)", border: "1px solid rgba(192,132,252,0.4)", borderRadius: 7, color: "#c084fc", fontSize: 12, fontWeight: 700, padding: "6px 10px", cursor: "pointer", flexShrink: 0 }} onClick={saveEdit}>저장</button>
                      <button style={{ background: "transparent", border: "none", color: "rgba(255,255,255,0.25)", fontSize: 13, cursor: "pointer", padding: "0 2px", flexShrink: 0 }} onClick={() => setEditIdx(null)}>취소</button>
                    </div>
                  ) : (
                    // 일반 모드
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <span style={{ fontSize: 11, color: "rgba(255,255,255,0.2)", width: 18, textAlign: "center", flexShrink: 0 }}>{idx + 1}</span>
                      <span
                        style={{ flex: 1, fontSize: 13, color: "rgba(255,255,255,0.8)", cursor: "pointer" }}
                        onClick={() => startEdit(idx)}
                      >{item}</span>
                      <button
                        style={{ background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 6, color: "rgba(255,255,255,0.4)", fontSize: 11, padding: "3px 8px", cursor: "pointer", flexShrink: 0 }}
                        onClick={() => startEdit(idx)}
                      >✏</button>
                      <button style={S.dtDel} onClick={() => delItem(idx)}>×</button>
                    </div>
                  )}
                </div>
              ))}
            </div>

            <div style={{ padding: "10px 18px 18px", flexShrink: 0, borderTop: "1px solid rgba(255,255,255,0.06)" }}>
              <button
                style={{ width: "100%", padding: "11px", background: "rgba(192,132,252,0.12)", border: "1px solid rgba(192,132,252,0.25)", borderRadius: 12, color: "#c084fc", fontSize: 13, fontWeight: 600, cursor: "pointer" }}
                onClick={() => setScreen("apply")}
              >
                ← 적용 화면으로
              </button>
            </div>
          </>
        )}

      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   DayView
═══════════════════════════════════════════════════════════════ */
function DayView({ dayKey, all, patchDay, onBack }) {
  const [dayTab,     setDayTab]     = useState("planner");
  const [newTask,    setNewTask]    = useState("");
  const [showEvForm, setShowEvForm] = useState(false);
  const [evText,     setEvText]     = useState("");
  const [evTime,     setEvTime]     = useState("");
  const [evCat,      setEvCat]      = useState("meeting");
  const [qLoading,   setQLoading]   = useState(false);
  const [qError,     setQError]     = useState(false);
  const [showFin,       setShowFin]       = useState(false);
  const [reviewLoading, setReviewLoading] = useState(false);
  const [showReport,    setShowReport]    = useState(false);
  const [showDefaultMgr,setShowDefaultMgr]= useState(false);
  const [moneyTab,   setMoneyTab]   = useState("expense");
  const [mDesc,      setMDesc]      = useState("");
  const [mAmount,    setMAmount]    = useState("");
  const [mCat,       setMCat]       = useState("food");
  const [mIncCat,    setMIncCat]    = useState("salary");
  const [mOptional,  setMOptional]  = useState(false);
  const [showMForm,  setShowMForm]  = useState(false);
  const [receiptScan, setReceiptScan] = useState(false);   // 영수증 스캔 모달
  const [scanLoading, setScanLoading] = useState(false);
  const [scanItems,   setScanItems]   = useState([]);       // 분석된 항목들
  const [scanDone,    setScanDone]    = useState(false);

  const day = (all && all[dayKey]) ? { ...mkDay(), ...all[dayKey] } : mkDay();
  const parsed = parseKey(dayKey);
  const { y, m, d } = parsed;
  const dow = new Date(y, m, d).getDay();
  const isToday = dayKey === todayKey;

  const done  = day.tasks.filter((t) => t.done).length;
  const total = day.tasks.length;
  const evs   = day.events || [];
  const inc   = day.income || [];
  const exp   = day.expenses || [];
  const tInc  = sumIncome(day);
  const tExp  = sumExpense(day);
  const tEss  = sumEssential(day);
  const tOpt  = sumOptional(day);
  const net   = tInc - tExp;

  // Load question on mount
  useEffect(() => {
    if (!day.question && !qLoading) {
      setQLoading(true);
      fetchQuestion(dayKey)
        .then((q) => patchDay(dayKey, { question: q }))
        .catch(() => setQError(true))
        .finally(() => setQLoading(false));
    }
  }, [dayKey]);

  const reloadQ = () => {
    setQLoading(true); setQError(false);
    fetchQuestion(dayKey)
      .then((q) => patchDay(dayKey, { question: q }))
      .catch(() => setQError(true))
      .finally(() => setQLoading(false));
  };

  const addTask = () => {
    if (!newTask.trim()) return;
    patchDay(dayKey, { tasks: [...day.tasks, { id: Date.now(), text: newTask.trim(), done: false }] });
    setNewTask("");
  };
  const applyDefaults = (items) => {
    const existing = new Set(day.tasks.map(t => t.text));
    const toAdd = items.filter(t => !existing.has(t)).map(text => ({ id: Date.now() + Math.random(), text, done: false }));
    if (toAdd.length === 0) return;
    patchDay(dayKey, { tasks: [...day.tasks, ...toAdd] });
  };
  const toggleTask = (id) => patchDay(dayKey, { tasks: day.tasks.map((t) => t.id === id ? { ...t, done: !t.done } : t) });
  const delTask    = (id) => patchDay(dayKey, { tasks: day.tasks.filter((t) => t.id !== id) });

  const addEv = () => {
    if (!evText.trim()) return;
    const ev = { id: Date.now(), text: evText.trim(), time: evTime, category: evCat };
    const sorted = [...evs, ev].sort((a, b) => a.time.localeCompare(b.time));
    patchDay(dayKey, { events: sorted });
    setEvText(""); setEvTime(""); setEvCat("meeting"); setShowEvForm(false);
  };
  const delEv = (id) => patchDay(dayKey, { events: evs.filter((e) => e.id !== id) });

  const addMoney = () => {
    if (!mDesc.trim() || !mAmount) return;
    const amt = parseInt(String(mAmount).replace(/,/g, ""), 10);
    if (isNaN(amt) || amt <= 0) return;
    if (moneyTab === "income") {
      patchDay(dayKey, { income: [...inc, { id: Date.now(), desc: mDesc.trim(), amount: amt, category: mIncCat }] });
    } else {
      patchDay(dayKey, { expenses: [...exp, { id: Date.now(), desc: mDesc.trim(), amount: amt, category: mCat, optional: mOptional }] });
    }
    setMDesc(""); setMAmount(""); setMOptional(false); setShowMForm(false);
  };
  const delIncome  = (id) => patchDay(dayKey, { income:   inc.filter((x) => x.id !== id) });
  const delExpense = (id) => patchDay(dayKey, { expenses: exp.filter((x) => x.id !== id) });

  // 영수증 이미지 분석
  const analyzeReceipt = async (file) => {
    setScanLoading(true); setScanItems([]); setScanDone(false);
    try {
      const base64 = await new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = () => res(r.result.split(",")[1]);
        r.onerror = () => rej(new Error("읽기 실패"));
        r.readAsDataURL(file);
      });
      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-6", max_tokens: 1000,
          messages: [{
            role: "user",
            content: [
              { type: "image", source: { type: "base64", media_type: file.type || "image/jpeg", data: base64 } },
              { type: "text", text: `이 영수증 이미지에서 구매 항목과 금액을 추출해주세요.
JSON만 응답 (다른 텍스트 없이):
{"store":"가게명","items":[{"desc":"품목명","amount":금액(숫자),"category":"food|transport|housing|health_e|edu|cafe|shopping|entertain|dining|beauty|sub|etc_ex"}]}
- 품목명은 한국어로 간결하게
- 금액은 숫자만 (원 단위)
- 합계/소계/부가세 행은 제외
- 품목이 없거나 영수증이 아니면 {"store":"","items":[]}` }
            ]
          }]
        })
      });
      const data = await resp.json();
      const txt = (data.content || []).map(c => c.text || "").join("");
      const parsed = JSON.parse(txt.replace(/```json|```/g, "").trim());
      const items = (parsed.items || []).map(it => ({
        ...it, id: Date.now() + Math.random(), optional: false, selected: true
      }));
      setScanItems(items.length > 0 ? items : []);
      setScanDone(true);
    } catch { setScanDone(true); }
    setScanLoading(false);
  };

  // 선택된 영수증 항목 일괄 추가
  const applyReceiptItems = () => {
    const toAdd = scanItems.filter(it => it.selected).map(it => ({
      id: Date.now() + Math.random(),
      desc: it.desc, amount: it.amount,
      category: it.category || "etc_ex",
      optional: it.optional,
      subItems: []
    }));
    if (toAdd.length > 0) {
      patchDay(dayKey, { expenses: [...exp, ...toAdd] });
    }
    setReceiptScan(false); setScanItems([]); setScanDone(false);
  };
  const toggleOptional = (id) => patchDay(dayKey, { expenses: exp.map((x) => x.id === id ? { ...x, optional: !x.optional } : x) });
  const addSubItem = (parentId, desc, amount, optional, category) => {
    const newSub = { id: Date.now(), desc, amount, optional, category: category || "etc_ex" };
    patchDay(dayKey, { expenses: exp.map((x) => x.id === parentId ? { ...x, subItems: [...(x.subItems || []), newSub] } : x) });
  };
  const delSubItem = (parentId, subId) => {
    patchDay(dayKey, { expenses: exp.map((x) => x.id === parentId ? { ...x, subItems: (x.subItems || []).filter((s) => s.id !== subId) } : x) });
  };
  const toggleSubOptional = (parentId, subId) => {
    patchDay(dayKey, { expenses: exp.map((x) => x.id === parentId ? { ...x, subItems: (x.subItems || []).map((s) => s.id === subId ? { ...s, optional: !s.optional } : s) } : x) });
  };
  const finishDay = async () => {
    setShowFin(false);
    setReviewLoading(true);
    // Build report data
    const taskLines  = day.tasks.map((t) => `${t.done ? "✅" : "⬜"} ${t.text}`).join("\n") || "없음";
    const evLines    = evs.map((e) => `${getECat(e.category).emoji} ${e.time ? e.time + " " : ""}${e.text}`).join("\n") || "없음";
    const expLines   = exp.map((x) => {
      const subs = (x.subItems || []);
      const amt  = subs.length > 0 ? subs.reduce((s, si) => s + Number(si.amount), 0) : Number(x.amount);
      return `${x.optional ? "💸불필요" : "😊필수"} ${getExpCat(x.category).emoji}${x.desc} -${fmt(amt)}원`;
    }).join("\n") || "없음";
    const incLines   = inc.map((x) => `${getIncCat(x.category).emoji}${x.desc} +${fmt(x.amount)}원`).join("\n") || "없음";
    const report = {
      date: dayKey, taskDone: done, taskTotal: total,
      evCount: evs.length, tInc, tExp,
      gratitude: day.gratitude, reflection: day.reflection,
      questionAnswer: day.questionAnswer,
      question: day.question?.question || "",
    };
    // AI review
    let aiReview = "";
    try {
      const prompt = `다음은 사용자의 하루 기록입니다. 따뜻하고 진심 어린 한국어로 하루를 총평해주세요. 3~4문장으로 간결하게, 잘한 점과 내일을 위한 한마디를 포함해주세요.

날짜: ${dayKey}
이벤트:\n${evLines}
할 일: ${done}/${total} 완료\n${taskLines}
수입: +${fmt(tInc)}원 / 지출: -${fmt(tExp)}원\n${expLines}\n수입:\n${incLines}
오늘의 질문: ${report.question}
답변: ${report.questionAnswer || "미작성"}
감사 일기: ${day.gratitude || "미작성"}
반성: ${day.reflection || "미작성"}

JSON만 응답(다른 텍스트 없이): {"review":"총평 내용"}`;
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 300,
          messages: [{ role: "user", content: prompt }] }),
      });
      const data = await res.json();
      const txt = (data.content || []).map((c) => c.text || "").join("");
      aiReview = JSON.parse(txt.replace(/```json|```/g, "").trim()).review;
    } catch (_) { aiReview = "총평을 불러오지 못했어요."; }
    setReviewLoading(false);
    patchDay(dayKey, { completed: true, report, aiReview });
    setShowReport(true);
  };

  return (
    <>
      {/* Header */}
      <div style={S.dayHdr}>
        <button style={S.backBtn} onClick={onBack}>‹</button>
        <div style={S.dayHdrMid}>
          <div style={S.dayHdrDate}>
            <span style={{ color: dow === 0 ? "#f87171" : dow === 6 ? "#60a5fa" : "#c084fc", fontWeight: 800, fontSize: 22 }}>{d}</span>

            <span style={{ color: "rgba(255,255,255,0.3)", fontSize: 12 }}>({DAY_NAMES[dow]})</span>
            {isToday && <span style={S.todayTag}>오늘</span>}
          </div>
          {total > 0 && (
            <div style={S.miniBar}>
              <div style={{ ...S.miniBarFill, width: `${(done / total) * 100}%` }} />
            </div>

        </div>

          ? <button style={S.undoBtn} onClick={() => patchDay(dayKey, { completed: false })} title="수정하기">✓완료 ✎</button>

        </button>
      </div>

      <div style={S.dayBody}>

        {dayTab === "planner" && (
          <>
            {/* Question */}
            <div style={S.qCard}>
              <div style={S.qTop}>
                <span style={S.qBadge}>💡 오늘의 질문</span>

              </div>
              {qLoading && (
                <div style={S.qLoad}>
                  {[0, 0.2, 0.4].map((delay, i) => (
                    <span key={i} style={{ ...S.qDot, animationDelay: delay + "s" }} />

                  <span style={S.qLoadTxt}>생성 중...</span>

              {qError && !qLoading && (
                <div style={S.qErr}>불러오기 실패 <button style={S.retryBtn} onClick={reloadQ}>재시도</button></div>

              {!qLoading && !qError && day.question && (
                <>

                  <textarea
                    style={S.qTA}
                    placeholder="짧게라도 적어보세요..."

                    onChange={(e) => patchDay(dayKey, { questionAnswer: e.target.value })}

            </div>

            {/* Events */}
            <div style={S.sec}>
              <div style={S.secRow}>

                <button style={S.miniBtn} onClick={() => setShowEvForm((v) => !v)}>{showEvForm ? "닫기" : "+ 추가"}</button>
              </div>
              {showEvForm && (

                    <select style={{ ...S.inp, flex: 1 }} value={evCat} onChange={(e) => setEvCat(e.target.value)}>
                      {ECATS.map((c) => <option key={c.id} value={c.id}>{c.emoji} {c.label}</option>)}

              {evs.length === 0 && !showEvForm && <div style={S.empty}>이벤트를 추가해보세요 📅</div>}
              {evs.map((ev) => {

                return (

                      <div style={S.evTxt}>{ev.text}</div>

                        {ev.time && <span style={{ color: "rgba(255,255,255,0.2)" }}>·</span>}
                        <span style={{ color: c.color }}>{c.emoji} {c.label}</span>
                      </div>
                    </div>
                    <button style={S.xBtn} onClick={() => delEv(ev.id)}>×</button>

            {/* Tasks */}
            <div style={S.sec}>

                <div style={S.secTtl}>📋 할 일</div>

            {day.completed && !reviewLoading && (

                <button style={S.editBtn} onClick={() => patchDay(dayKey, { completed: false })}>✎ 수정하기</button>

        {/* ── MONEY ── */}
        {dayTab === "money" && (

            <div style={S.mSummary}>
              <div style={S.mSumRow}>
                <div style={S.mSumItem}>
                  <div style={S.mSumLbl}>수입</div>
                  <div style={{ ...S.mSumVal, color: "#4ade80" }}>+{fmt(tInc)}</div>
                </div>
                <div style={S.mSumDivider} />
                <div style={S.mSumItem}>
                  <div style={S.mSumLbl}>지출</div>
                  <div style={{ ...S.mSumVal, color: "#f87171" }}>-{fmt(tExp)}</div>
                </div>
                <div style={S.mSumDivider} />
                <div style={S.mSumItem}>
                  <div style={S.mSumLbl}>잔액</div>
                  <div style={{ ...S.mSumVal, color: net > 0 ? "#4ade80" : net < 0 ? "#f87171" : "rgba(255,255,255,0.5)" }}>
                    {net > 0 ? "+" : net < 0 ? "-" : ""}{fmt(Math.abs(net))}
                  </div>
                </div>
              </div>
              {tExp > 0 && (
                <>
                  <div style={{ height: 1, background: "rgba(255,255,255,0.07)", margin: "14px 0 10px" }} />
                  <div style={{ display: "flex", justifyContent: "space-between" }}>
                    <div>
                      <div style={{ fontSize: 11, color: "#60a5fa", marginBottom: 2 }}>🏠 필수지출</div>
                      <div style={{ fontSize: 15, fontWeight: 700, color: "#60a5fa" }}>{fmt(tEss)}원</div>
                      <div style={{ fontSize: 10, color: "rgba(255,255,255,0.3)" }}>{tExp > 0 ? Math.round(tEss / tExp * 100) : 0}%</div>
                    </div>
                    <div style={{ textAlign: "right" }}>
                      <div style={{ fontSize: 11, color: "#f472b6", marginBottom: 2 }}>🛍 불필요지출</div>
                      <div style={{ fontSize: 15, fontWeight: 700, color: "#f472b6" }}>{fmt(tOpt)}원</div>
                      <div style={{ fontSize: 10, color: "rgba(255,255,255,0.3)" }}>{tExp > 0 ? Math.round(tOpt / tExp * 100) : 0}%</div>
                    </div>
                  </div>
                  <div style={{ height: 5, borderRadius: 3, background: "rgba(255,255,255,0.07)", overflow: "hidden", marginTop: 10 }}>
                    <div style={{ height: "100%", width: (tExp > 0 ? Math.round(tEss / tExp * 100) : 0) + "%", background: "linear-gradient(90deg,#60a5fa,#818cf8)", borderRadius: 3 }} />
                  </div>
                </>

            </div>

            {/* Add form */}
            <div style={S.sec}>
              <div style={S.secRow}>
                <div style={{ display: "flex", gap: 6 }}>
                  <button style={moneyTab === "expense" ? S.mTabA : S.mTabI} onClick={() => { setMoneyTab("expense"); setMCat("food"); }}>지출</button>
                  <button style={moneyTab === "income"  ? S.mTabA : S.mTabI} onClick={() => { setMoneyTab("income"); setMIncCat("salary"); }}>수입</button>
                </div>
                <div style={{ display: "flex", gap: 6 }}>
                  {moneyTab === "expense" && (
                    <button
                      style={{ background:"rgba(251,191,36,0.15)", border:"1px solid rgba(251,191,36,0.3)", borderRadius:7, color:"#fbbf24", fontSize:11, fontWeight:700, padding:"4px 9px", cursor:"pointer", display:"flex", alignItems:"center", gap:4 }}
                      onClick={() => { setReceiptScan(true); setScanItems([]); setScanDone(false); }}
                    >📷 영수증</button>

                      </select>

                      </select>
                      <button style={{ ...S.evSubmit, background: "rgba(74,222,128,0.18)", borderColor: "rgba(74,222,128,0.4)", color: "#4ade80" }} onClick={addMoney}>수입 추가 ✓</button>

          onAnalyze={analyzeReceipt}
          onApply={applyReceiptItems}
          fmt={fmt}
          getExpCat={getExpCat}
        />
      )}

      {/* Default task manager */}
      {showDefaultMgr && (
        <DefaultTaskManager
          onClose={() => setShowDefaultMgr(false)}
          onApply={applyDefaults}
        />
      )}

      {/* Finish modal */}
      {showFin && (
        <div style={S.overlay}>
          <div style={S.modal}>
            <div style={{ fontSize: 36, marginBottom: 12 }}>🌙</div>
            <div style={S.modalTtl}>하루를 마무리할까요?</div>
            <div style={S.modalSub}>
              할 일 {done}/{total} 완료 · 이벤트 {evs.length}개<br />
              수입 {fmt(tInc)}원 · 지출 {fmt(tExp)}원<br />
              {day.questionAnswer ? "💡 질문 답변 완료 ✓" : "💡 질문 미답변"}
            </div>
            <button style={S.modalOk} onClick={finishDay}>마무리하기</button>
            <button style={S.modalNo} onClick={() => setShowFin(false)}>돌아가기</button>
          </div>
        </div>
      )}

      {/* Report popup */}
      {showReport && day.completed && (
        <div style={S.overlay}>
          <div style={S.reportPopup}>
            {/* Header */}
            <div style={S.reportPopupHdr}>
              <div>
                <div style={S.reportPopupDate}>{parseKey(dayKey).y}년 {parseKey(dayKey).m + 1}월 {parseKey(dayKey).d}일 ({DAY_NAMES[new Date(parseKey(dayKey).y, parseKey(dayKey).m, parseKey(dayKey).d).getDay()]})</div>
                <div style={S.reportPopupSub}>하루 요약 리포트</div>
              </div>
              <button style={S.reportCloseBtn} onClick={() => setShowReport(false)}>×</button>
            </div>

            <div style={S.reportPopupBody}>
              {/* Stats grid */}
              <div style={S.reportGrid}>
                <div style={S.reportItem}>
                  <div style={S.reportLbl}>할 일</div>
                  <div style={{ ...S.reportVal, color: done === total && total > 0 ? "#4ade80" : "#c084fc" }}>{done}/{total}</div>
                  <div style={S.reportSub}>{total > 0 ? Math.round(done / total * 100) + "%" : "—"}</div>
                </div>
                <div style={S.reportItem}>
                  <div style={S.reportLbl}>이벤트</div>
                  <div style={S.reportVal}>{evs.length}</div>
                  <div style={S.reportSub}>건</div>
                </div>
                <div style={S.reportItem}>
                  <div style={S.reportLbl}>수입</div>
                  <div style={{ ...S.reportVal, color: "#4ade80", fontSize: 13 }}>+{fmt(tInc)}</div>
                  <div style={S.reportSub}>원</div>
                </div>
                <div style={S.reportItem}>
                  <div style={S.reportLbl}>지출</div>
                  <div style={{ ...S.reportVal, color: "#f87171", fontSize: 13 }}>-{fmt(tExp)}</div>
                  <div style={S.reportSub}>원</div>
                </div>
              </div>

              {/* Net */}
              {(tInc > 0 || tExp > 0) && (
                <div style={S.reportNet}>
                  <span style={{ color: "rgba(255,255,255,0.45)", fontSize: 13 }}>잔액</span>
                  <span style={{ color: tInc - tExp > 0 ? "#4ade80" : tInc - tExp < 0 ? "#f87171" : "rgba(255,255,255,0.4)", fontWeight: 800, fontSize: 16 }}>
                    {tInc - tExp > 0 ? "+" : tInc - tExp < 0 ? "-" : ""}{fmt(Math.abs(tInc - tExp))}원
                  </span>
                </div>
              )}

              {/* Essential vs Optional */}
              {tExp > 0 && (
                <div style={{ ...S.reportExpRow, marginBottom: 12 }}>
                  <span style={{ color: "#60a5fa", fontSize: 12 }}>😊 필수 {fmt(tEss)}원</span>
                  <span style={{ color: "#f472b6", fontSize: 12 }}>💸 불필요 {fmt(tOpt)}원</span>
                </div>
              )}

              {/* Divider */}
              <div style={{ height: 1, background: "rgba(255,255,255,0.07)", margin: "12px 0" }} />

              {/* Gratitude */}
              {day.gratitude && (
                <div style={S.reportSection}>
                  <div style={S.reportSecLbl}>🙏 감사 일기</div>
                  <div style={S.reportSecVal}>{day.gratitude}</div>
                </div>
              )}

              {/* Reflection */}
              {day.reflection && (
                <div style={S.reportSection}>
                  <div style={S.reportSecLbl}>💭 반성</div>
                  <div style={S.reportSecVal}>{day.reflection}</div>
                </div>
              )}

              {/* Question & Answer */}
              {day.question && (
                <div style={S.reportSection}>
                  <div style={S.reportSecLbl}>💡 오늘의 질문</div>
                  <div style={{ ...S.reportSecVal, color: "#fbbf24" }}>{day.question.question}</div>
                  {day.questionAnswer && (
                    <div style={{ ...S.reportSecVal, marginTop: 4, color: "rgba(255,255,255,0.65)" }}>→ {day.questionAnswer}</div>
                  )}
                </div>
              )}

              {/* AI Review */}
              {day.aiReview && (
                <>
                  <div style={{ height: 1, background: "rgba(255,255,255,0.07)", margin: "12px 0" }} />
                  <div style={S.aiReviewCard}>
                    <div style={S.aiReviewTitle}>✦ AI 하루 총평</div>
                    <div style={S.aiReviewText}>{day.aiReview}</div>
                  </div>
                </>
              )}
            </div>

            {/* Footer */}
            <div style={S.reportPopupFtr}>
              <button style={S.modalOk} onClick={() => setShowReport(false)}>닫기</button>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

/* ═══════════════════════════════════════════════════════════════
   LedgerView
═══════════════════════════════════════════════════════════════ */
function LedgerView({ all, onBack, onOpenDay }) {
  const now = new Date();
  const [period,  setPeriod]  = useState("month");
  const [customS, setCustomS] = useState("");
  const [customE, setCustomE] = useState("");

  const getKeys = () => {
    if (!all) return [];
    const keys = Object.keys(all).sort();
    if (period === "week") {
      const d = new Date(); d.setDate(d.getDate() - 6);
      const from = toKey(d.getFullYear(), d.getMonth(), d.getDate());
      return keys.filter((k) => k >= from && k <= todayKey);
    }
    if (period === "month") {
      const prefix = now.getFullYear() + "-" + String(now.getMonth() + 1).padStart(2, "0");
      return keys.filter((k) => k.startsWith(prefix));
    }
    if (period === "custom" && customS && customE) {
      return keys.filter((k) => k >= customS && k <= customE);
    }
    return [];
  };

  const ledgerKeys  = getKeys();
  const ledgerDays  = ledgerKeys.map((k) => ({ key: k, ...mkDay(), ...(all[k] || {}) }));
  const totalIncome    = ledgerDays.reduce((s, d) => s + sumIncome(d),    0);
  const totalExpense   = ledgerDays.reduce((s, d) => s + sumExpense(d),   0);
  const totalEssential = ledgerDays.reduce((s, d) => s + sumEssential(d), 0);
  const totalOptional  = ledgerDays.reduce((s, d) => s + sumOptional(d),  0);
  const netTotal = totalIncome - totalExpense;

  const expByCat = {};
  ledgerDays.forEach((d) => (d.expenses || []).forEach((x) => {
    expByCat[x.category] = (expByCat[x.category] || 0) + Number(x.amount);
  }));
  const expCatList = Object.entries(expByCat).sort((a, b) => b[1] - a[1]);

  const activeDays = ledgerDays.filter((d) => sumIncome(d) > 0 || sumExpense(d) > 0);

  return (
    <>
      <div style={S.calHdr}>
        <div style={S.calHdrTop}>
          <button style={S.backBtn} onClick={onBack}>‹</button>
          <span style={{ ...S.logo, marginLeft: 4 }}>💳 가계부</span>
          <div />
        </div>
      </div>

      <div style={S.ledBody}>
        {/* Period */}
        <div style={S.periodRow}>
          {[["week", "이번 주"], ["month", "이번 달"], ["custom", "직접 설정"]].map(([v, l]) => (
            <button key={v} style={period === v ? S.periodA : S.periodI} onClick={() => setPeriod(v)}>{l}</button>
          ))}
        </div>
        {period === "custom" && (
          <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
            <input type="date" style={{ ...S.inp, fontSize: 12, colorScheme: "dark" }} value={customS} onChange={(e) => setCustomS(e.target.value)} />
            <span style={{ color: "rgba(255,255,255,0.3)", alignSelf: "center" }}>~</span>
            <input type="date" style={{ ...S.inp, fontSize: 12, colorScheme: "dark" }} value={customE} onChange={(e) => setCustomE(e.target.value)} />
          </div>
        )}

        {/* Big summary */}
        <div style={S.ledSummary}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
            <div>
              <div style={{ fontSize: 12, color: "rgba(255,255,255,0.35)", marginBottom: 6 }}>총 수지</div>
              <div style={{ fontSize: 26, fontWeight: 800, color: netTotal > 0 ? "#4ade80" : netTotal < 0 ? "#f87171" : "rgba(255,255,255,0.5)" }}>
                {netTotal > 0 ? "+" : netTotal < 0 ? "-" : ""}{fmt(Math.abs(netTotal))}원
              </div>
            </div>
            <div style={{ textAlign: "right" }}>
              <div style={{ fontSize: 12, color: "rgba(255,255,255,0.35)", marginBottom: 4 }}>
                수입 <span style={{ color: "#4ade80", fontWeight: 600 }}>+{fmt(totalIncome)}</span>
              </div>
              <div style={{ fontSize: 12, color: "rgba(255,255,255,0.35)" }}>
                지출 <span style={{ color: "#f87171", fontWeight: 600 }}>-{fmt(totalExpense)}</span>
              </div>
            </div>
          </div>
          {totalExpense > 0 && (
            <>
              <div style={{ height: 1, background: "rgba(255,255,255,0.07)", margin: "14px 0" }} />
              <div style={{ display: "flex", justifyContent: "space-between" }}>
                <div>
                  <div style={{ fontSize: 11, color: "#60a5fa", marginBottom: 2 }}>🏠 필수 지출</div>
                  <div style={{ fontSize: 16, fontWeight: 700, color: "#60a5fa" }}>{fmt(totalEssential)}원</div>
                  <div style={{ fontSize: 11, color: "rgba(255,255,255,0.3)" }}>{Math.round(totalEssential / totalExpense * 100)}%</div>
                </div>
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontSize: 11, color: "#f472b6", marginBottom: 2 }}>🛍 불필요 지출</div>
                  <div style={{ fontSize: 16, fontWeight: 700, color: "#f472b6" }}>{fmt(totalOptional)}원</div>
                  <div style={{ fontSize: 11, color: "rgba(255,255,255,0.3)" }}>{Math.round(totalOptional / totalExpense * 100)}%</div>
                </div>
              </div>
              <div style={{ height: 6, borderRadius: 3, background: "rgba(255,255,255,0.07)", overflow: "hidden", marginTop: 10 }}>
                <div style={{ height: "100%", width: Math.round(totalEssential / totalExpense * 100) + "%", background: "linear-gradient(90deg,#60a5fa,#818cf8)", borderRadius: 3 }} />
              </div>
            </>
          )}
        </div>

        {/* Category breakdown */}
        {expCatList.length > 0 && (
          <div style={S.sec}>
            <div style={S.secTtl}>📊 카테고리별 지출</div>
            {expCatList.map(([catId, amt]) => {
              const c   = getExpCat(catId);
              const pct = totalExpense > 0 ? Math.round(amt / totalExpense * 100) : 0;
              return (
                <div key={catId} style={{ marginBottom: 10 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                    <span style={{ fontSize: 13, color: "rgba(255,255,255,0.7)" }}>{c.emoji} {c.label}</span>
                    <div style={{ textAlign: "right" }}>
                      <span style={{ fontSize: 13, fontWeight: 600, color: "#f87171" }}>-{fmt(amt)}</span>
                      <span style={{ fontSize: 11, color: "rgba(255,255,255,0.3)", marginLeft: 6 }}>{pct}%</span>
                    </div>
                  </div>
                  <div style={{ height: 4, borderRadius: 2, background: "rgba(255,255,255,0.07)", overflow: "hidden" }}>
                    <div style={{ height: "100%", width: pct + "%", background: "linear-gradient(90deg,#f87171,#f472b6)", borderRadius: 2 }} />
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* Day list */}
        {activeDays.length > 0 && (
          <div style={S.sec}>
            <div style={S.secTtl}>📅 일별 내역</div>
            {[...activeDays].reverse().map((d) => {
              const p   = parseKey(d.key);
              const dow = new Date(p.y, p.m, p.d).getDay();
              const tI  = sumIncome(d);
              const tE  = sumExpense(d);
              return (
                <div key={d.key} style={S.ledDayRow} onClick={() => onOpenDay(d.key)}>
                  <div style={{ flexShrink: 0, textAlign: "center", width: 40 }}>
                    <div style={{ fontSize: 18, fontWeight: 700, color: dow === 0 ? "#f87171" : dow === 6 ? "#60a5fa" : "rgba(255,255,255,0.8)" }}>{p.d}</div>
                    <div style={{ fontSize: 10, color: "rgba(255,255,255,0.3)" }}>{DAY_NAMES[dow]}</div>
                  </div>
                  <div style={{ flex: 1, paddingLeft: 4 }}>
                    {tI > 0 && <div style={{ fontSize: 12, color: "#4ade80" }}>+{fmt(tI)}</div>}
                    {tE > 0 && <div style={{ fontSize: 12, color: "#f87171" }}>-{fmt(tE)}</div>}
                  </div>
                  <div style={{ fontSize: 14, fontWeight: 700, color: tI - tE > 0 ? "#4ade80" : tI - tE < 0 ? "#f87171" : "rgba(255,255,255,0.4)" }}>
                    {tI - tE > 0 ? "+" : tI - tE < 0 ? "-" : ""}{fmt(Math.abs(tI - tE))}
                  </div>
                  <span style={{ color: "rgba(255,255,255,0.2)", fontSize: 16, marginLeft: 8 }}>›</span>
                </div>
              );
            })}
          </div>
        )}

        {activeDays.length === 0 && (
          <div style={{ ...S.empty, padding: "40px 0", fontSize: 14 }}>
            이 기간에 가계부 기록이 없어요<br />
            <span style={{ fontSize: 12, color: "rgba(255,255,255,0.15)" }}>달력에서 날짜를 눌러 기록하세요</span>
          </div>
        )}
      </div>
    </>
  );
}

async function callClaude(prompt, maxTokens = 500) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: maxTokens,
      messages: [{ role: "user", content: prompt }] }),
  });
  const data = await res.json();
  return (data.content || []).map(c => c.text || "").join("");
}

// ── ExpressionCard ──────────────────────────────────────────────
function ExpressionCard({ expr, idx, dayNum, checked, onToggleCheck }) {
  const [open,      setOpen]      = useState(false);
  const [showTr,    setShowTr]    = useState(false);
  const [playing,   setPlaying]   = useState(false);
  const [aiState,   setAiState]   = useState("idle"); // idle|loading|done
  const [aiHTML,    setAiHTML]    = useState("");
  const [aiOpen,    setAiOpen]    = useState(false);

  const speak = (e) => {
    e.stopPropagation();
    if (!("speechSynthesis" in window)) return;
    const synth = window.speechSynthesis;
    if (synth.speaking) { synth.cancel(); setPlaying(false); return; }
    const utter = new SpeechSynthesisUtterance(expr.example);
    utter.lang = "en-US"; utter.rate = 0.85;
    const vs = synth.getVoices();
    const v = vs.find(v=>v.lang==="en-US"&&v.name.includes("Samantha")) || vs.find(v=>v.lang==="en-US") || vs.find(v=>v.lang.startsWith("en"));
    if (v) utter.voice = v;
    utter.onstart = () => setPlaying(true);
    utter.onend   = () => setPlaying(false);
    utter.onerror = () => setPlaying(false);
    synth.speak(utter);
    setTimeout(() => { if (synth.paused) synth.resume(); }, 150);
  };

  const requestAI = async (e) => {
    e.stopPropagation();
    if (aiState === "done") { setAiOpen(v=>!v); return; }
    setAiState("loading");
    const prompt = `다음 OPIc 영어 표현과 예문을 분석해줘. 반드시 아래 JSON 형식으로만 응답해. 다른 텍스트나 마크다운 없이 JSON만.
표현: ${expr.phrase}
예문: ${expr.example}
{"words":[{"word":"단어/구","pos":"품사","meaning":"한국어뜻"}],"idioms":[{"idiom":"숙어","meaning":"한국어뜻","tip":"팁"}],"grammar":[{"point":"문법포인트","explanation":"설명"}],"tip":"OPIc 실전 팁 2~3문장"}`;
    try {
      const raw = await callClaude(prompt, 800);
      const parsed = JSON.parse(raw.replace(/```json|```/g,"").trim());
      // build display data
      setAiHTML(parsed);
      setAiState("done"); setAiOpen(true);
    } catch { setAiState("idle"); }
  };

  return (
    <div style={{ ...OP.exCard, ...(checked ? OP.exCardDone : {}) }}>
      {/* Header */}
      <div style={OP.exCardHdr} onClick={()=>setOpen(v=>!v)}>
        {/* Checkbox before number */}
        <button
          style={{ ...OP.exCheckBox, ...(checked ? OP.exCheckBoxDone : {}) }}
          onClick={e=>{ e.stopPropagation(); onToggleCheck(); }}
          title="학습 완료 표시"
        >
          {checked && <span style={OP.exCheckMark}>✓</span>}
        </button>
        <div style={{flex:1}}>
          <div style={{...OP.exNum,...(checked?{color:"#34d399"}:{})}}>{String(idx+1).padStart(2,"0")}</div>
          <div style={{...OP.exPhrase,...(checked?{color:"#6ee7b7"}:{})}}>{expr.phrase}</div>
          <div style={OP.exMeaning}>{expr.meaning}</div>
        </div>
        <div style={{...OP.exArrow, transform: open?"rotate(180deg)":"none"}}>↓</div>
      </div>

      {/* Body */}
      {open && (
        <div style={OP.exBody}>
          <div style={OP.exBodyTop}>
            <span style={OP.exLabel}>예문</span>
            <div style={{display:"flex",gap:6}}>
              <button style={{...OP.speakBtn,...(playing?OP.speakBtnPlay:{})}} onClick={speak}>{playing?"⏹":"🔊"}</button>
              <button style={{...OP.trBtn,...(showTr?OP.trBtnOn:{})}} onClick={e=>{e.stopPropagation();setShowTr(v=>!v);}}>
                {showTr?"해석 숨기기":"🇰🇷 해석 보기"}
              </button>
            </div>
          </div>
          <div style={OP.exText}>"{expr.example}"</div>
          {showTr && <div style={OP.trBox}>{expr.translation}</div>}

          {/* AI 분석 */}
          <div style={{marginTop:10}}>
            <button
              style={{...OP.aiBtn, ...(aiState==="done"?OP.aiBtnDone:aiState==="loading"?OP.aiBtnLoading:OP.aiBtnIdle)}}
              onClick={requestAI}
              disabled={aiState==="loading"}
            >
              {aiState==="loading" ? "분석 중..." : aiState==="done" ? (aiOpen?"✦ AI 분석 닫기":"✦ AI 분석 열기") : "✦ AI 분석"}
            </button>
          </div>

          {aiState==="done" && aiOpen && aiHTML && (
            <div style={OP.aiPanel}>
              <div style={OP.aiPanelHdr}><span>🤖</span><span style={OP.aiPanelTitle}>AI 언어 분석</span></div>
              <div style={OP.aiPanelBody}>
                {aiHTML.words?.length>0 && (
                  <div style={OP.aiSection}>
                    <div style={OP.aiSecTitle}>📖 단어 & 표현</div>
                    {aiHTML.words.map((w,i)=>(
                      <div key={i} style={{marginBottom:7}}>
                        <span style={OP.aiTag}>{w.word}</span>
                        <span style={{fontSize:11,color:"#64748b",marginLeft:6}}>{w.pos}</span>
                        <span style={{fontSize:13,color:"#cbd5e1",marginLeft:6}}>— {w.meaning}</span>
                      </div>
                    ))}
                  </div>
                )}
                {aiHTML.idioms?.length>0 && (
                  <div style={OP.aiSection}>
                    <div style={OP.aiSecTitle}>💬 숙어 & 관용구</div>
                    {aiHTML.idioms.map((it,i)=>(
                      <div key={i} style={{marginBottom:10}}>
                        <span style={{...OP.aiTag,background:"rgba(251,191,36,0.1)",borderColor:"rgba(251,191,36,0.25)",color:"#fcd34d"}}>{it.idiom}</span>
                        <div style={{marginTop:4,fontSize:13,color:"#e2e8f0"}}>{it.meaning}</div>
                        {it.tip&&<div style={{marginTop:3,fontSize:12,color:"#94a3b8"}}>💡 {it.tip}</div>}
                      </div>
                    ))}
                  </div>
                )}
                {aiHTML.grammar?.length>0 && (
                  <div style={OP.aiSection}>
                    <div style={OP.aiSecTitle}>📐 문법 포인트</div>
                    {aiHTML.grammar.map((g,i)=>(
                      <div key={i} style={{marginBottom:10}}>
                        <span style={{...OP.aiTag,background:"rgba(52,211,153,0.1)",borderColor:"rgba(52,211,153,0.25)",color:"#6ee7b7"}}>{g.point}</span>
                        <div style={{marginTop:5,fontSize:12.5,color:"#94a3b8",lineHeight:"1.7",whiteSpace:"pre-wrap"}}>{g.explanation}</div>
                      </div>
                    ))}
                  </div>
                )}
                {aiHTML.tip && (
                  <div style={OP.aiSection}>
                    <div style={OP.aiSecTitle}>🎯 OPIc 실전 팁</div>
                    <div style={{background:"rgba(251,191,36,0.07)",border:"1px solid rgba(251,191,36,0.2)",borderRadius:8,padding:"10px 12px",fontSize:12.5,color:"#fcd34d",lineHeight:"1.7"}}>{aiHTML.tip}</div>
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}
