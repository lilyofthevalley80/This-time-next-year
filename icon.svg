<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 배경 -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="60%" stop-color="#1a3a6e"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="58%" r="40%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="round">
      <rect width="512" height="512" rx="100" ry="100"/>
    </clipPath>
  </defs>

  <g clip-path="url(#round)">
    <!-- 배경 하늘 -->
    <rect width="512" height="512" fill="url(#sky)"/>

    <!-- 태양 글로우 -->
    <ellipse cx="256" cy="295" rx="180" ry="120" fill="url(#glow)"/>

    <!-- 태양 광선 -->
    <g opacity="0.35" stroke="#fcd34d" stroke-width="3" stroke-linecap="round">
      <line x1="256" y1="200" x2="256" y2="168"/>
      <line x1="256" y1="200" x2="284" y2="172"/>
      <line x1="256" y1="200" x2="228" y2="172"/>
      <line x1="256" y1="200" x2="308" y2="186"/>
      <line x1="256" y1="200" x2="204" y2="186"/>
      <line x1="256" y1="200" x2="320" y2="208"/>
      <line x1="256" y1="200" x2="192" y2="208"/>
    </g>

    <!-- 태양 반원 -->
    <path d="M 156 295 A 100 100 0 0 1 356 295 Z" fill="url(#sun)"/>
    <ellipse cx="256" cy="295" rx="100" ry="18" fill="#fcd34d" opacity="0.4"/>

    <!-- 수평선 -->
    <rect x="0" y="295" width="512" height="4" fill="#f97316" opacity="0.8"/>

    <!-- 바다 -->
    <rect x="0" y="299" width="512" height="213" fill="url(#sea)"/>

    <!-- 바다 반사 -->
    <ellipse cx="256" cy="340" rx="80" ry="12" fill="#f97316" opacity="0.25"/>
    <ellipse cx="256" cy="370" rx="50" ry="7" fill="#fcd34d" opacity="0.15"/>
    <ellipse cx="256" cy="395" rx="30" ry="5" fill="#fcd34d" opacity="0.1"/>

    <!-- 물결 -->
    <path d="M 60 320 Q 100 314 140 320 Q 180 326 220 320 Q 260 314 300 320 Q 340 326 380 320 Q 420 314 460 320" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
    <path d="M 40 340 Q 90 334 140 340 Q 190 346 240 340 Q 290 334 340 340 Q 390 346 440 340 Q 470 334 500 340" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>

    <!-- 갈매기 -->
    <path d="M 140 240 Q 152 232 164 240" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 170 228 Q 182 220 194 228" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round"/>
    <path d="M 320 235 Q 332 227 344 235" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
